<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dice Clicker / Roller Incremental</title>
    <style>
        :root {
            --bg-color: #1a472a; /* 緑のフェルト風 */
            --panel-color: rgba(0, 0, 0, 0.7);
            --text-color: #ffffff;
            --accent-color: #ffd700;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow: hidden;
            user-select: none;
            touch-action: none;
        }

        /* ヘッダー：所持金 */
        #header {
            position: absolute;
            top: 0; width: 100%;
            height: 60px;
            background: var(--panel-color);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            font-weight: bold;
            z-index: 10;
            border-bottom: 2px solid rgba(255,255,255,0.1);
        }

        /* プレイエリア */
        #game-canvas {
            display: block;
            background: radial-gradient(circle, #2e7d32 0%, #1a472a 100%);
        }

        /* 下部メニュー */
        #footer {
            position: absolute;
            bottom: 0; width: 100%;
            height: 220px;
            background: var(--panel-color);
            z-index: 10;
            display: flex;
            flex-direction: column;
        }

        .tabs {
            display: flex;
            background: rgba(255,255,255,0.1);
        }

        .tab-btn {
            flex: 1;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            border-bottom: 3px solid transparent;
        }

        .tab-btn.active {
            border-bottom-color: var(--accent-color);
            background: rgba(255,255,255,0.1);
        }

        .tab-content {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            display: none;
        }

        .tab-content.active { display: block; }

        /* アップグレードアイテム */
        .upgrade-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255,255,255,0.05);
            margin-bottom: 5px;
            padding: 8px 12px;
            border-radius: 4px;
        }

        .upgrade-info { flex: 1; }
        .upgrade-name { font-weight: bold; font-size: 14px; }
        .upgrade-cost { color: var(--accent-color); font-size: 12px; }

        .buy-btn {
            background: #4caf50;
            border: none;
            color: white;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
        }

        .buy-btn:disabled { background: #666; cursor: not-allowed; }

        /* ティア切替 */
        .tier-selector {
            display: flex;
            gap: 5px;
            margin-bottom: 10px;
            overflow-x: auto;
        }
        .tier-btn {
            padding: 4px 8px;
            font-size: 12px;
            background: #444;
            border: none;
            color: #fff;
            border-radius: 3px;
        }
        .tier-btn.active { background: var(--accent-color); color: #000; }
        .tier-btn:disabled { opacity: 0.3; }

        /* 浮遊テキスト */
        .float-text {
            position: absolute;
            pointer-events: none;
            font-weight: bold;
            color: #fff;
            text-shadow: 1px 1px 2px #000;
            animation: floatUp 1s ease-out forwards;
        }

        @keyframes floatUp {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-50px); opacity: 0; }
        }
    </style>
</head>
<body>

<div id="header">
    $ <span id="money-display">0</span>
</div>

<canvas id="game-canvas"></canvas>

<div id="footer">
    <div class="tabs">
        <div class="tab-btn active" onclick="showTab('upgrades')">アップグレード</div>
        <div class="tab-btn" onclick="showTab('stats')">統計</div>
        <div class="tab-btn" onclick="showTab('settings')">設定</div>
    </div>

    <div id="upgrades" class="tab-content active">
        <div class="tier-selector" id="tier-selector">
            </div>
        <div id="upgrade-list">
            </div>
    </div>

    <div id="stats" class="tab-content">
        <div id="stats-display">読み込み中...</div>
    </div>

    <div id="settings" class="tab-content">
        <button onclick="resetGame()" style="background: #f44336; color: white; border: none; padding: 10px; width: 100%;">データをリセットする</button>
    </div>
</div>

<script>
/**
 * ゲーム設定と定数
 */
const TIERS = [
    { id: 0, name: "通常", color: "#ffffff", baseCost: 10, multiplier: 1, unlockAt: 0 },
    { id: 1, name: "銅", color: "#cd7f32", baseCost: 500, multiplier: 2, unlockAt: 20 },
    { id: 2, name: "銀", color: "#c0c0c0", baseCost: 10000, multiplier: 4, unlockAt: 20 },
    { id: 3, name: "金", color: "#ffd700", baseCost: 200000, multiplier: 8, unlockAt: 20 },
    { id: 4, name: "プラチナ", color: "#e5e4e2", baseCost: 5000000, multiplier: 16, unlockAt: 20 }
];

const GROWTH_RATE = 1.15;

/**
 * ゲーム状態（セーブ対象）
 */
let gameState = {
    money: 0,
    totalMoney: 0,
    playTime: 0,
    clicks: 0,
    activeTier: 0,
    tiers: TIERS.map(t => ({
        owned: 0,
        maxLimit: 20,
        bonusMult: 1,
        luck: 0, // 5,6が出やすくなる度合い
        stats: [0,0,0,0,0,0,0] // index 1-6に出目回数
    }))
};

// 初期の1個目
gameState.tiers[0].owned = 1;

/**
 * 物理エンジン/レンダリング用
 */
const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');
let dice = [];
let particles = [];

class Die {
    constructor(tierIdx) {
        this.tierIdx = tierIdx;
        this.size = 40;
        this.x = Math.random() * (canvas.width - this.size);
        this.y = Math.random() * (canvas.height - 100) + 60;
        this.vx = 0;
        this.vy = 0;
        this.angle = Math.random() * Math.PI * 2;
        this.va = 0;
        this.value = 1;
        this.isRolling = false;
        this.timer = 0;
    }

    roll(forceX, forceY) {
        this.vx = forceX;
        this.vy = forceY;
        this.va = (Math.random() - 0.5) * 0.5;
        this.isRolling = true;
        this.timer = 30 + Math.random() * 30;
    }

    update() {
        if (this.isRolling) {
            this.x += this.vx;
            this.y += this.vy;
            this.angle += this.va;
            
            // 摩擦
            this.vx *= 0.95;
            this.vy *= 0.95;
            this.va *= 0.95;

            // 壁バウンス
            if (this.x < 0 || this.x > canvas.width - this.size) this.vx *= -1;
            if (this.y < 60 || this.y > canvas.height - 220 - this.size) this.vy *= -1;

            this.timer--;
            if (this.timer <= 0 && Math.abs(this.vx) < 0.2) {
                this.stopRolling();
            }
        }
    }

    stopRolling() {
        this.isRolling = false;
        this.vx = 0; this.vy = 0; this.va = 0;
        
        // 出目の決定（重み付け）
        const tier = gameState.tiers[this.tierIdx];
        const weights = [1, 1, 1, 1, 1 + tier.luck, 1 + tier.luck * 2];
        const totalWeight = weights.reduce((a, b) => a + b, 0);
        let random = Math.random() * totalWeight;
        for (let i = 0; i < 6; i++) {
            if (random < weights[i]) {
                this.value = i + 1;
                break;
            }
            random -= weights[i];
        }

        // 報酬計算
        const gain = this.value * TIERS[this.tierIdx].multiplier * tier.bonusMult;
        gameState.money += gain;
        gameState.totalMoney += gain;
        tier.stats[this.value]++;
        
        createFloatText(this.x + this.size/2, this.y, `+$${gain.toLocaleString()}`);
        updateUI();
    }

    draw() {
        ctx.save();
        ctx.translate(this.x + this.size/2, this.y + this.size/2);
        ctx.rotate(this.angle);
        
        // 本体
        ctx.fillStyle = TIERS[this.tierIdx].color;
        ctx.strokeStyle = "#000";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.roundRect(-this.size/2, -this.size/2, this.size, this.size, 5);
        ctx.fill();
        ctx.stroke();

        // 目（ドット）
        ctx.fillStyle = (this.tierIdx === 0 || this.tierIdx === 2) ? "#000" : "#fff";
        this.drawDots(this.value);
        
        ctx.restore();
    }

    drawDots(val) {
        const s = this.size;
        const p = s / 4;
        const dots = {
            1: [[0,0]],
            2: [[-p, p], [p, -p]],
            3: [[-p, p], [0,0], [p, -p]],
            4: [[-p, p], [p, p], [-p, -p], [p, -p]],
            5: [[-p, p], [p, p], [0,0], [-p, -p], [p, -p]],
            6: [[-p, p], [p, p], [-p, 0], [p, 0], [-p, -p], [p, -p]]
        };
        dots[val].forEach(d => {
            ctx.beginPath();
            ctx.arc(d[0], d[1], s/10, 0, Math.PI*2);
            ctx.fill();
        });
    }
}

/**
 * システム関数
 */

function init() {
    resize();
    loadGame();
    syncDiceCount();
    window.addEventListener('resize', resize);
    
    // インタラクション
    canvas.addEventListener('mousedown', handleInteraction);
    canvas.addEventListener('touchstart', (e) => handleInteraction(e.touches[0]));
    
    requestAnimationFrame(gameLoop);
    setInterval(saveGame, 10000); // 10秒オートセーブ
    setInterval(() => gameState.playTime++, 1000);
}

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}

function syncDiceCount() {
    dice = [];
    gameState.tiers.forEach((t, idx) => {
        for (let i = 0; i < t.owned; i++) {
            dice.push(new Die(idx));
        }
    });
}

function handleInteraction(e) {
    gameState.clicks++;
    dice.forEach(d => {
        const dx = d.x + d.size/2 - e.clientX;
        const dy = d.y + d.size/2 - e.clientY;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (dist < 150) { // スワイプ/タップ影響範囲
            const force = (150 - dist) / 10;
            d.roll((Math.random()-0.5) * force, (Math.random()-0.5) * force);
        }
    });
}

function createFloatText(x, y, text) {
    const el = document.createElement('div');
    el.className = 'float-text';
    el.style.left = x + 'px';
    el.style.top = y + 'px';
    el.innerText = text;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1000);
}

function gameLoop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    dice.forEach(d => {
        d.update();
        d.draw();
    });
    
    requestAnimationFrame(gameLoop);
}

/**
 * UI管理
 */
function showTab(tabId) {
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(tabId).classList.add('active');
    event.currentTarget.classList.add('active');
    if(tabId === 'stats') updateStats();
    renderUpgrades();
}

function updateUI() {
    document.getElementById('money-display').innerText = Math.floor(gameState.money).toLocaleString();
}

function renderUpgrades() {
    const container = document.getElementById('upgrade-list');
    const tierSelector = document.getElementById('tier-selector');
    const tIdx = gameState.activeTier;
    const tierData = gameState.tiers[tIdx];
    
    // ティアボタン
    tierSelector.innerHTML = '';
    TIERS.forEach((t, i) => {
        const btn = document.createElement('button');
        btn.className = `tier-btn ${i === tIdx ? 'active' : ''}`;
        btn.innerText = t.name;
        // 解放条件チェック
        const prevTierOwned = i > 0 ? gameState.tiers[i-1].owned : 999;
        btn.disabled = prevTierOwned < t.unlockAt;
        btn.onclick = () => { gameState.activeTier = i; renderUpgrades(); };
        tierSelector.appendChild(btn);
    });

    const upgs = [
        { name: "個数追加", key: "owned", base: TIERS[tIdx].baseCost, val: tierData.owned, max: tierData.maxLimit },
        { name: "購入上限UP", key: "maxLimit", base: TIERS[tIdx].baseCost * 5, val: tierData.maxLimit, step: 10 },
        { name: "報酬強化", key: "bonusMult", base: TIERS[tIdx].baseCost * 2, val: tierData.bonusMult, isMult: true },
        { name: "確率操作", key: "luck", base: TIERS[tIdx].baseCost * 10, val: tierData.luck }
    ];

    container.innerHTML = '';
    upgs.forEach(u => {
        const cost = Math.floor(u.base * Math.pow(GROWTH_RATE, (u.key==='owned' ? u.val : (u.isMult ? u.val*5 : u.val))));
        const item = document.createElement('div');
        item.className = 'upgrade-item';
        item.innerHTML = `
            <div class="upgrade-info">
                <div class="upgrade-name">${u.name} (Lv.${u.val})</div>
                <div class="upgrade-cost">$${cost.toLocaleString()}</div>
            </div>
            <button class="buy-btn" ${gameState.money < cost || (u.key==='owned' && u.val >= u.max) ? 'disabled' : ''} 
                onclick="buyUpgrade('${u.key}', ${cost}, ${tIdx})">購入</button>
        `;
        container.appendChild(item);
    });
}

function buyUpgrade(key, cost, tIdx) {
    if (gameState.money >= cost) {
        gameState.money -= cost;
        if (key === 'bonusMult') gameState.tiers[tIdx][key] += 0.5;
        else if (key === 'luck') gameState.tiers[tIdx][key] += 1;
        else gameState.tiers[tIdx][key] += (key === 'maxLimit' ? 10 : 1);
        
        if (key === 'owned') syncDiceCount();
        updateUI();
        renderUpgrades();
    }
}

function updateStats() {
    const s = gameState;
    const currentTier = s.tiers[s.activeTier];
    let html = `
        <p>総プレイ時間: ${s.playTime}秒</p>
        <p>総クリック数: ${s.clicks}</p>
        <p>累計獲得金額: $${Math.floor(s.totalMoney).toLocaleString()}</p>
        <hr>
        <h4>ティア別統計 (${TIERS[s.activeTier].name})</h4>
        <p>出目分布:</p>
        <ul>
            ${[1,2,3,4,5,6].map(v => `<li>${v}: ${currentTier.stats[v]}回</li>`).join('')}
        </ul>
    `;
    document.getElementById('stats-display').innerHTML = html;
}

/**
 * セーブ＆ロード
 */
function saveGame() {
    localStorage.setItem('diceClickerSave', JSON.stringify(gameState));
    console.log("Game Saved");
}

function loadGame() {
    const saved = localStorage.getItem('diceClickerSave');
    if (saved) {
        const parsed = JSON.parse(saved);
        // マージ（将来的なアップデート対応用）
        gameState = Object.assign(gameState, parsed);
        updateUI();
    }
}

function resetGame() {
    if(confirm("全てのデータを消去して最初からやり直しますか？")) {
        localStorage.removeItem('diceClickerSave');
        location.reload();
    }
}

// 起動
init();

</script>
</body>
</html>

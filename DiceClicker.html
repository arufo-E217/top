<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dice Clicker - Pro</title>
    <style>
        :root {
            --bg-color: #1a472a;
            --panel-color: rgba(0, 0, 0, 0.85);
            --text-color: #ffffff;
            --accent-color: #ffd700;
            --footer-height: 250px;
            --footer-minimized: 40px;
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow: hidden;
            user-select: none;
            touch-action: none;
        }

        #header {
            position: absolute;
            top: 0; width: 100%; height: 60px;
            background: var(--panel-color);
            display: flex; justify-content: center; align-items: center;
            font-size: 24px; font-weight: bold; z-index: 10;
        }

        #game-canvas { display: block; }

        #footer {
            position: absolute;
            bottom: 0; width: 100%;
            height: var(--footer-height);
            background: var(--panel-color);
            z-index: 20;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; flex-direction: column;
        }

        #footer.minimized {
            transform: translateY(calc(var(--footer-height) - var(--footer-minimized)));
        }

        #toggle-btn {
            height: var(--footer-minimized);
            background: #333;
            color: var(--accent-color);
            text-align: center;
            line-height: var(--footer-minimized);
            cursor: pointer;
            font-weight: bold;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .tabs { display: flex; background: rgba(255,255,255,0.05); }
        .tab-btn {
            flex: 1; padding: 12px; text-align: center; cursor: pointer;
            border-bottom: 3px solid transparent; font-size: 14px;
        }
        .tab-btn.active { border-bottom-color: var(--accent-color); background: rgba(255,255,255,0.1); }

        .tab-content { flex: 1; overflow-y: auto; padding: 15px; display: none; }
        .tab-content.active { display: block; }

        .upgrade-item {
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(255,255,255,0.05); margin-bottom: 8px;
            padding: 10px; border-radius: 6px;
        }
        .upgrade-info { flex: 1; }
        .upgrade-name { font-weight: bold; font-size: 14px; }
        .upgrade-cost { color: var(--accent-color); font-size: 12px; }

        .buy-btn {
            background: #4caf50; border: none; color: white;
            padding: 8px 16px; border-radius: 4px; cursor: pointer;
        }
        .buy-btn:disabled { background: #555; opacity: 0.6; }

        .tier-selector { display: flex; gap: 8px; margin-bottom: 12px; overflow-x: auto; padding-bottom: 5px; }
        .tier-btn { padding: 6px 12px; font-size: 12px; background: #444; border: none; color: #fff; border-radius: 4px; white-space: nowrap; }
        .tier-btn.active { background: var(--accent-color); color: #000; }

        .float-text {
            position: absolute; pointer-events: none; font-weight: bold;
            color: #fff; text-shadow: 1px 1px 2px #000;
            animation: floatUp 0.8s ease-out forwards; z-index: 15;
        }
        @keyframes floatUp {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-60px); opacity: 0; }
        }
    </style>
</head>
<body>

<div id="header">$ <span id="money-display">0</span></div>

<canvas id="game-canvas"></canvas>

<div id="footer">
    <div id="toggle-btn" onclick="toggleFooter()">▲ UPGRADES / MENU ▲</div>
    <div class="tabs">
        <div class="tab-btn active" onclick="showTab('upgrades')">強化</div>
        <div class="tab-btn" onclick="showTab('stats')">統計</div>
        <div class="tab-btn" onclick="showTab('settings')">設定</div>
    </div>

    <div id="upgrades" class="tab-content active">
        <div class="tier-selector" id="tier-selector"></div>
        <div id="upgrade-list"></div>
    </div>

    <div id="stats" class="tab-content">
        <div id="stats-display"></div>
    </div>

    <div id="settings" class="tab-content">
        <button onclick="resetGame()" style="background: #f44336; color: white; border: none; padding: 12px; width: 100%; border-radius: 5px;">セーブデータを削除</button>
    </div>
</div>

<script>
// ============================================================================
// ゲーム設定・パラメータ群（すべてここで変更可能）
// ============================================================================
const GAME_CONFIG = {
    // セーブデータ関連
    SAVE_KEY: 'diceSave_v3',
    SAVE_INTERVAL: 5000,

    // プレイヤーの各ティアの初期状態パラメータ
    INITIAL_STATE: {
        maxLimit: 20,
        bonusMult: 1,
        luck: 0,
        speedLv: 0,
        ownedInitial: 1 // tier 0（通常）の初期所有数
    },

    // ティア（サイコロの種類）定義
    TIERS: [
        { id: 0, name: "通常", color: "#ffffff", baseCost: 10, multiplier: 1, unlockAt: 0 },
        { id: 1, name: "銅", color: "#cd7f32", baseCost: 1000, multiplier: 6, unlockAt: 20 },
        { id: 2, name: "銀", color: "#c0c0c0", baseCost: 50000, multiplier: 15, unlockAt: 20 },
        { id: 3, name: "金", color: "#ffd700", baseCost: 500000, multiplier: 10000, unlockAt: 20 },
        { id: 4, name: "プラチナ", color: "#e5e4e2", baseCost: 2500000, multiplier: 500000, unlockAt: 20 }
    ],

    // 出目の確率ウェイト設定（1の目 〜 6の目）
    DICE_WEIGHTS: {
        base: [1, 1, 1, 1, 1, 1],
        luckMults: [0, 0, 0, 0, 1, 1.5] // luckレベル1あたり各目に加算されるウェイト係数
    },

    // アップグレードごとのパラメータ計算設定
    // 費用計算式: Math.floor( (TIER基本コスト * baseCostMult) * (costPowBase ^ (現在レベル * costPowMult)) )
    UPGRADES: {
        owned: {
            name: "サイコロ購入",
            incrementText: "",
            increment: 1,
            baseCostMult: 1,      
            costPowBase: 1.15,    
            costPowMult: 1        
        },
        maxLimit: {
            name: "上限解放",
            incrementText: " (+10)",
            increment: 10,
            baseCostMult: 10,
            costPowBase: 1.15,
            costPowMult: 2
        },
        bonusMult: {
            name: "獲得倍率UP",
            incrementText: "",
            increment: 0.5,
            baseCostMult: 2,
            costPowBase: 1.15,
            costPowMult: 4
        },
        luck: {
            name: "イカサマ(出目強化)",
            incrementText: "",
            increment: 1,
            baseCostMult: 15,
            costPowBase: 1.15,
            costPowMult: 2
        },
        speedLv: {
            name: "時短(停止速度UP)",
            incrementText: "",
            increment: 1,
            maxLevel: 35,         // このアップグレードの最大レベル
            baseCostMult: 5,
            costPowBase: 1.15,
            costPowMult: 2
        }
    },

    // サイコロの物理・挙動パラメータ
    DICE_PHYSICS: {
        size: 36,
        spawnYMin: 100,
        spawnYRange: 300,
        rollVaMult: 0.8,
        initialFrames: 105,
        framesReductionPerSpeedLv: 3,
        minFrames: 3,
        friction: 0.96,
        bounceFriction: -0.8,
        boundaryTop: 65,
        footerMinimizedBoundary: 50,
        footerExpandedBoundary: 260,
        touchDistThreshold: 100,
        touchForceDivisor: 5,
        touchForceMultiplier: 3
    },

    // UI設定パラメータ
    UI_SETTINGS: {
        floatTextDuration: 800
    }
};
// ============================================================================

let gameState = {
    money: 0, totalMoney: 0, playTime: 0, clicks: 0, activeTier: 0,
    tiers: []
};

// ゲーム起動時に初期状態を構成（最新のパラメータ定義でベースを作る）
function buildInitialState() {
    gameState.tiers = GAME_CONFIG.TIERS.map(() => ({
        owned: 0, 
        maxLimit: GAME_CONFIG.INITIAL_STATE.maxLimit, 
        bonusMult: GAME_CONFIG.INITIAL_STATE.bonusMult, 
        luck: GAME_CONFIG.INITIAL_STATE.luck, 
        speedLv: GAME_CONFIG.INITIAL_STATE.speedLv, 
        stats: new Array(GAME_CONFIG.DICE_WEIGHTS.base.length + 1).fill(0)
    }));
    gameState.tiers[0].owned = GAME_CONFIG.INITIAL_STATE.ownedInitial;
}
buildInitialState();

const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');
let dice = [];
let footerMinimized = false;
let isPointerDown = false;

class Die {
    constructor(tierIdx) {
        this.tierIdx = tierIdx;
        this.size = GAME_CONFIG.DICE_PHYSICS.size;
        this.spawn();
    }

    spawn() {
        const p = GAME_CONFIG.DICE_PHYSICS;
        this.x = Math.random() * (canvas.width - this.size);
        this.y = p.spawnYMin + Math.random() * p.spawnYRange;
        this.vx = 0; this.vy = 0; this.angle = Math.random() * 6; this.va = 0;
        this.value = 1; this.isRolling = false; this.timer = 0;
    }

    roll(fx, fy) {
        if (this.isRolling) return;
        const p = GAME_CONFIG.DICE_PHYSICS;
        const t = gameState.tiers[this.tierIdx];
        this.vx = fx; this.vy = fy;
        this.va = (Math.random() - 0.5) * p.rollVaMult;
        this.isRolling = true;
        
        // 時短計算
        const reductionFrames = t.speedLv * p.framesReductionPerSpeedLv;
        this.timer = Math.max(p.minFrames, p.initialFrames - reductionFrames);
    }

    update() {
        if (!this.isRolling) return;
        const p = GAME_CONFIG.DICE_PHYSICS;
        
        this.x += this.vx; this.y += this.vy; this.angle += this.va;
        this.vx *= p.friction; this.vy *= p.friction; this.va *= p.friction;

        const bottomBoundary = footerMinimized ? canvas.height - p.footerMinimizedBoundary : canvas.height - p.footerExpandedBoundary;
        
        if (this.x < 0) { this.x = 0; this.vx *= p.bounceFriction; }
        if (this.x > canvas.width - this.size) { this.x = canvas.width - this.size; this.vx *= p.bounceFriction; }
        if (this.y < p.boundaryTop) { this.y = p.boundaryTop; this.vy *= p.bounceFriction; }
        if (this.y > bottomBoundary - this.size) { this.y = bottomBoundary - this.size; this.vy *= p.bounceFriction; }

        this.timer--;
        if (this.timer <= 0) {
            this.stop();
        }
    }

    stop() {
        this.isRolling = false; this.vx = 0; this.vy = 0;
        const t = gameState.tiers[this.tierIdx];
        const wConfig = GAME_CONFIG.DICE_WEIGHTS;
        
        // パラメータに沿って各目のウェイトを計算
        const weights = wConfig.base.map((w, i) => w + t.luck * wConfig.luckMults[i]);
        let total = weights.reduce((a, b) => a + b, 0);
        let rand = Math.random() * total;
        
        for (let i = 0; i < weights.length; i++) {
            if (rand < weights[i]) { this.value = i + 1; break; }
            rand -= weights[i];
        }
        
        const gain = this.value * GAME_CONFIG.TIERS[this.tierIdx].multiplier * t.bonusMult;
        gameState.money += gain; gameState.totalMoney += gain;
        t.stats[this.value]++;
        createFloatText(this.x + this.size/2, this.y, `+$${Math.floor(gain).toLocaleString()}`);
        updateUI();
    }

    draw() {
        ctx.save();
        ctx.translate(this.x + this.size/2, this.y + this.size/2);
        ctx.rotate(this.angle);
        ctx.fillStyle = GAME_CONFIG.TIERS[this.tierIdx].color;
        ctx.strokeStyle = "#000"; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.roundRect(-this.size/2, -this.size/2, this.size, this.size, 6); ctx.fill(); ctx.stroke();
        ctx.fillStyle = (this.tierIdx % 2 === 0) ? "#000" : "#fff";
        this.drawDots(this.value);
        ctx.restore();
    }

    drawDots(v) {
        const p = this.size / 4;
        const dot = (x, y) => { ctx.beginPath(); ctx.arc(x, y, this.size/10, 0, Math.PI*2); ctx.fill(); };
        if (v === 1) dot(0, 0);
        if (v === 2) { dot(-p, p); dot(p, -p); }
        if (v === 3) { dot(-p, p); dot(0, 0); dot(p, -p); }
        if (v === 4) { dot(-p, p); dot(p, p); dot(-p, -p); dot(p, -p); }
        if (v === 5) { dot(-p, p); dot(p, p); dot(0, 0); dot(-p, -p); dot(p, -p); }
        if (v >= 6)  { dot(-p, p); dot(p, p); dot(-p, 0); dot(p, 0); dot(-p, -p); dot(p, -p); }
    }
}

function init() {
    resize(); loadGame(); syncDice();
    window.addEventListener('resize', resize);
    
    // 操作：擦る動きに対応
    canvas.addEventListener('pointerdown', (e) => { isPointerDown = true; checkRoll(e); });
    canvas.addEventListener('pointermove', (e) => { if(isPointerDown) checkRoll(e); });
    window.addEventListener('pointerup', () => { isPointerDown = false; });

    requestAnimationFrame(loop);
    setInterval(saveGame, GAME_CONFIG.SAVE_INTERVAL);
}

function checkRoll(e) {
    const p = GAME_CONFIG.DICE_PHYSICS;
    gameState.clicks++;
    dice.forEach(d => {
        const dx = d.x + d.size/2 - e.clientX;
        const dy = d.y + d.size/2 - e.clientY;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (dist < p.touchDistThreshold && !d.isRolling) {
            const force = (p.touchDistThreshold - dist) / p.touchForceDivisor;
            d.roll((Math.random()-0.5)*force*p.touchForceMultiplier, (Math.random()-0.5)*force*p.touchForceMultiplier);
        }
    });
}

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}

function toggleFooter() {
    footerMinimized = !footerMinimized;
    const f = document.getElementById('footer');
    const b = document.getElementById('toggle-btn');
    if (footerMinimized) {
        f.classList.add('minimized');
        b.innerText = "▼ OPEN UPGRADES ▼";
    } else {
        f.classList.remove('minimized');
        b.innerText = "▲ CLOSE MENU ▲";
    }
}

function syncDice() {
    dice = [];
    gameState.tiers.forEach((t, i) => {
        for (let n = 0; n < t.owned; n++) dice.push(new Die(i));
    });
}

function loop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    dice.forEach(d => { d.update(); d.draw(); });
    requestAnimationFrame(loop);
}

function createFloatText(x, y, txt) {
    const div = document.createElement('div');
    div.className = 'float-text';
    div.style.left = x + 'px'; div.style.top = y + 'px';
    div.innerText = txt;
    document.body.appendChild(div);
    setTimeout(() => div.remove(), GAME_CONFIG.UI_SETTINGS.floatTextDuration);
}

function showTab(id) {
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    event.currentTarget.classList.add('active');
    if(id==='stats') updateStats();
    renderUpgrades();
}

function renderUpgrades() {
    const list = document.getElementById('upgrade-list');
    const sel = document.getElementById('tier-selector');
    const tIdx = gameState.activeTier;
    const tData = gameState.tiers[tIdx];

    // タブが表示されていない（設定や統計の）ときは更新しない
    if(!document.getElementById('upgrades').classList.contains('active')) return;

    sel.innerHTML = '';
    GAME_CONFIG.TIERS.forEach((t, i) => {
        const b = document.createElement('button');
        b.className = `tier-btn ${i === tIdx ? 'active' : ''}`;
        b.innerText = t.name;
        b.disabled = i > 0 && gameState.tiers[i-1].owned < t.unlockAt;
        b.onclick = () => { gameState.activeTier = i; renderUpgrades(); };
        sel.appendChild(b);
    });

    list.innerHTML = '';
    const ugKeys = ['owned', 'maxLimit', 'bonusMult', 'luck', 'speedLv'];
    const tBaseCost = GAME_CONFIG.TIERS[tIdx].baseCost;

    ugKeys.forEach(key => {
        const conf = GAME_CONFIG.UPGRADES[key];
        const val = tData[key];
        
        // GAME_CONFIGに基づく柔軟なコスト計算
        const baseCost = tBaseCost * conf.baseCostMult;
        const cost = Math.floor(baseCost * Math.pow(conf.costPowBase, val * conf.costPowMult));
        
        let isMax = false;
        if (key === 'owned' && val >= tData.maxLimit) isMax = true;
        if (key === 'speedLv' && val >= conf.maxLevel) isMax = true;
        
        const displayName = conf.name + conf.incrementText;
        const item = document.createElement('div');
        item.className = 'upgrade-item';
        
        item.innerHTML = `
            <div class="upgrade-info">
                <div class="upgrade-name">${displayName} (Lv.${val})</div>
                <div class="upgrade-cost">${isMax ? 'MAX' : '$'+cost.toLocaleString()}</div>
            </div>
            <button class="buy-btn" ${gameState.money < cost || isMax ? 'disabled' : ''} 
                onclick="buy('${key}', ${cost}, ${tIdx})">購入</button>
        `;
        list.appendChild(item);
    });
}

function buy(key, cost, idx) {
    if (gameState.money >= cost) {
        gameState.money -= cost;
        const conf = GAME_CONFIG.UPGRADES[key];
        
        if (key === 'owned') { 
            gameState.tiers[idx][key] += conf.increment; 
            syncDice(); 
        } else {
            gameState.tiers[idx][key] += conf.increment;
        }
        updateUI();
    }
}

function updateUI() {
    document.getElementById('money-display').innerText = Math.floor(gameState.money).toLocaleString();
    renderUpgrades();
}

function updateStats() {
    const s = gameState;
    const t = s.tiers[s.activeTier];
    const faces = GAME_CONFIG.DICE_WEIGHTS.base.length;
    const faceArr = Array.from({length: faces}, (_, i) => i + 1);
    
    document.getElementById('stats-display').innerHTML = `
        <p>累計: $${Math.floor(s.totalMoney).toLocaleString()}</p>
        <p>クリック回数: ${s.clicks}</p>
        <hr>
        <h4>${GAME_CONFIG.TIERS[s.activeTier].name}の出目統計</h4>
        ${faceArr.map(v => `<div>${v}: ${t.stats[v]}回</div>`).join('')}
    `;
}

function saveGame() { 
    localStorage.setItem(GAME_CONFIG.SAVE_KEY, JSON.stringify(gameState)); 
}

function loadGame() {
    const saved = localStorage.getItem(GAME_CONFIG.SAVE_KEY);
    if (saved) { 
        const parsed = JSON.parse(saved);
        
        // 読み込みに影響を与えないよう、現在のパラメータ定義(buildInitialState)をベースにして、
        // セーブデータの進捗部分（プリミティブ値）だけを安全にマージ・再計算する
        ['money', 'totalMoney', 'playTime', 'clicks', 'activeTier'].forEach(key => {
            if (parsed[key] !== undefined) gameState[key] = parsed[key];
        });
        
        if (parsed.tiers && Array.isArray(parsed.tiers)) {
            for (let i = 0; i < GAME_CONFIG.TIERS.length; i++) {
                if (parsed.tiers[i]) {
                    // stats配列のマージ
                    if (parsed.tiers[i].stats) {
                        for(let j=0; j < gameState.tiers[i].stats.length; j++){
                            if(parsed.tiers[i].stats[j] !== undefined) {
                                gameState.tiers[i].stats[j] = parsed.tiers[i].stats[j];
                            }
                        }
                    }
                    // 各種アップグレード値のマージ
                    ['owned', 'maxLimit', 'bonusMult', 'luck', 'speedLv'].forEach(k => {
                        if (parsed.tiers[i][k] !== undefined) gameState.tiers[i][k] = parsed.tiers[i][k];
                    });
                }
            }
        }
        updateUI(); 
    }
}

function resetGame() { 
    if(confirm("初期化しますか？")) { 
        localStorage.clear(); 
        location.reload(); 
    } 
}

init();
</script>
</body>
</html>

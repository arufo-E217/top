<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEON DASH: FUTURE CITY</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-pink: #ff00ff;
            --neon-yellow: #fff200;
            --bg-dark: #050510;
        }
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background: #000; color: #fff;
            font-family: 'Share Tech Mono', monospace;
            /* 中央に16:9のボックスを配置するための追記 */
            display: flex; justify-content: center; align-items: center;
        }
        #game-container {
            position: relative; width: 100vw; max-width: calc(100vh * 16 / 9);
            height: 100vh; max-height: calc(100vw * 9 / 16); /* 確実な16:9維持 */
            aspect-ratio: 16 / 9; background: radial-gradient(circle at 50% 50%, #101030 0%, #050510 100%);
            overflow: hidden;
        }
        canvas { display: block; width: 100%; height: 100%; }

        /* HUD - 超高速更新UI */
        #hud {
            position: absolute; top: 0; left: 0; width: 100%; padding: 20px;
            pointer-events: none; z-index: 10;
            display: flex; justify-content: space-between; align-items: flex-start;
            box-sizing: border-box;
        }
        .hud-data {
            text-shadow: 0 0 10px var(--neon-blue);
            font-size: 1.5rem; letter-spacing: 2px;
        }
        #timer-val { color: var(--neon-pink); font-size: 2.5rem; text-shadow: 0 0 15px var(--neon-pink); }

        /* COMBO - 巨大かつスタイリッシュに */
        #combo-container {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none; text-align: center; z-index: 5;
            opacity: 0; transition: opacity 0.2s;
        }
        #combo-num {
            font-size: 8rem; font-style: italic; font-weight: 900;
            background: linear-gradient(to bottom, #fff 30%, var(--neon-yellow) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 20px var(--neon-yellow));
            margin: 0; line-height: 1;
        }
        .combo-label { font-size: 1.5rem; color: var(--neon-yellow); letter-spacing: 10px; }

        /* カウントダウン */
        #countdown {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 12rem; color: #fff; text-shadow: 0 0 30px var(--neon-blue);
            z-index: 100; pointer-events: none; display: none;
        }

        /* オーバーレイ */
        .overlay {
            position: absolute; inset: 0; background: rgba(0,0,10,0.9);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 200; backdrop-filter: blur(10px);
        }
        h1 { font-size: 4rem; margin: 0; background: linear-gradient(90deg, var(--neon-blue), var(--neon-pink)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .btn {
            margin-top: 30px; padding: 15px 60px; border: 1px solid var(--neon-blue);
            background: rgba(0, 242, 255, 0.1); color: var(--neon-blue);
            font-family: inherit; font-size: 1.5rem; cursor: pointer; transition: 0.3s;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
        }
        .btn:hover { background: var(--neon-blue); color: #000; box-shadow: 0 0 30px var(--neon-blue); }

        /* スキャンライン演出 */
        #game-container::after {
            content: ""; position: absolute; inset: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 4px, 3px 100%; pointer-events: none; z-index: 15;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="hud">
        <div>
            <div class="hud-data">SCORE: <span id="score-val">000000</span></div>
            <div class="hud-data" style="font-size: 1rem; opacity: 0.7;">COMBO: <span id="combo-stat">0</span></div>
        </div>
        <div id="timer-val">30.00</div>
    </div>

    <div id="combo-container">
        <p id="combo-num">0</p>
        <p class="combo-label">CHAIN</p>
        <div style="width: 100%; height: 6px; background: rgba(255, 242, 0, 0.2); margin-top: 10px;">
            <div id="combo-gauge" style="width: 100%; height: 100%; background: var(--neon-yellow);"></div>
        </div>
    </div>

    <div id="countdown"></div>

    <div id="start-overlay" class="overlay">
        <h1>NEON CITY DASH</h1>
        <p style="color: var(--neon-blue); opacity: 0.6;">SYSTEM READY / NEURAL LINK ESTABLISHED</p>
        <input type="text" id="seed-input" placeholder="ENTER SEED (OPTIONAL)" 
               style="margin-top: 20px; padding: 10px; background: rgba(0, 242, 255, 0.1); border: 1px solid var(--neon-blue); color: var(--neon-blue); font-family: inherit; font-size: 1.2rem; text-align: center; outline: none; width: 60%; max-width: 300px;">
        
        <button class="btn" onclick="startCountdown()">INITIALIZE</button>
    </div>

    <div id="result-overlay" class="overlay" style="display:none;">
        <h1 style="color: var(--neon-yellow); -webkit-text-fill-color: var(--neon-yellow);">TERMINATED</h1>
        <div id="final-score" style="font-size: 3rem; margin: 20px 0;">0</div>
        <button class="btn" onclick="location.reload()">RE-SYNC</button>
    </div>

    <canvas id="gameCanvas"></canvas>
</div>

<script>
    /* =========================================
       ゲームシステム設定領域
    ========================================= */
    const GAME_CONFIG = {
        comboDuration: 3.0, // コンボが切れるまでの制限時間（秒）
    };

    // 各アイテムの詳細設定（出現頻度はweightの比率で決定されます）
    const ITEM_CONFIG = {
        BLUE: {
            size: 12,          // 大きさ (当たり判定・描画基準)
            weight: 40,        // 出現頻度・確率の重み
            scorePlus: 100,    // 増やすスコア
            timePlus: 0,       // 増やす時間(秒)
            scoreMinus: 0,     // ペナルティスコア (減点)
            timeMinus: 0,      // ペナルティ時間(秒)
            comboAction: 'add',// 'add': コンボ加算, 'reset': コンボリセット, 'none': 無影響
            color: '--neon-blue'
        },
        GREEN: {
            size: 18,
            weight: 20,
            scorePlus: 0,
            timePlus: 3,
            scoreMinus: 0,
            timeMinus: 0,
            comboAction: 'add',
            color: '--neon-yellow'
        },
        RED: {
            size: 15,
            weight: 40,
            scorePlus: 0,
            timePlus: 0,
            scoreMinus: 0,
            timeMinus: 2,
            comboAction: 'reset',
            color: '--neon-pink'
        }
    };

    /* =========================================
       シード乱数システム
    ========================================= */
    let currentSeed = 1;
    function initSeed(input) {
        if (!input) input = Date.now().toString(); // 未入力時はランダム
        let h = 0;
        for (let i = 0; i < input.length; i++) {
            h = Math.imul(31, h) + input.charCodeAt(i) | 0;
        }
        currentSeed = h || 1;
    }
    // シードに基づく疑似乱数ジェネレーター (0.0 ~ 1.0)
    function seededRandom() {
        let x = Math.sin(currentSeed++) * 10000;
        return x - Math.floor(x);
    }

    // 重み付きでアイテム種類を抽選
    function getRandomItemType() {
        let totalWeight = Object.values(ITEM_CONFIG).reduce((sum, item) => sum + item.weight, 0);
        let r = seededRandom() * totalWeight;
        for (let type in ITEM_CONFIG) {
            if (r < ITEM_CONFIG[type].weight) return type;
            r -= ITEM_CONFIG[type].weight;
        }
        return 'BLUE'; // Fallback
    }

    /* =========================================
       メインロジック
    ========================================= */
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const V_WIDTH = 1280, V_HEIGHT = 720;
    
    let score = 0, timeLeft = 30.00, combo = 0, comboScale = 1;
    let comboTimer = 0; // コンボの残り時間
    let gameState = 'START';
    let entities = [], particles = [], trail = [];
    let player = { x: V_WIDTH/2, y: V_HEIGHT * 0.8, r: 15 };
    let frame = 0, gridScroll = 0, shake = 0;

    function resize() {
        const rect = canvas.parentElement.getBoundingClientRect();
        canvas.width = rect.width; canvas.height = rect.height;
    }
    window.addEventListener('resize', resize);
    resize();

    const updatePlayerPos = (e) => {
        if (gameState !== 'PLAYING') return;
        const rect = canvas.getBoundingClientRect();
        const clientX = e.clientX || (e.touches ? e.touches[0].clientX : 0);
        const clientY = e.clientY || (e.touches ? e.touches[0].clientY : 0);
        player.x = (clientX - rect.left) * (V_WIDTH / rect.width);
        player.y = (clientY - rect.top) * (V_HEIGHT / rect.height);
    };
    window.addEventListener('mousemove', updatePlayerPos);
    window.addEventListener('touchmove', e => { updatePlayerPos(e); e.preventDefault(); }, {passive:false});

    function startCountdown() {
        // シード値の初期化
        const seedInput = document.getElementById('seed-input').value;
        initSeed(seedInput);

        document.getElementById('start-overlay').style.display = 'none';
        gameState = 'COUNTDOWN';
        const cd = document.getElementById('countdown');
        cd.style.display = 'block';
        let count = 3;
        
        const timer = setInterval(() => {
            if (count > 0) {
                cd.innerText = count;
                cd.style.transform = 'translate(-50%, -50%) scale(2)';
                cd.style.opacity = '1';
                setTimeout(() => {
                    cd.style.transform = 'translate(-50%, -50%) scale(1)';
                    cd.style.opacity = '0';
                }, 500);
                count--;
            } else if (count === 0) {
                cd.innerText = "GO!";
                cd.style.opacity = '1';
                setTimeout(() => cd.style.display = 'none', 500);
                gameState = 'PLAYING';
                lastTime = performance.now();
                loop();
                clearInterval(timer);
            }
        }, 1000);
    }

    function createExplosion(x, y, color) {
        for(let i=0; i<10; i++) {
            particles.push({
                x, y, 
                vx: (seededRandom()-0.5)*20, vy: (seededRandom()-0.5)*20, // 爆発もシード管理
                life: 1.0, color
            });
        }
    }

    let lastTime = 0;
    function loop(now = performance.now()) {
        if (gameState !== 'PLAYING') return;
        const dt = (now - lastTime) / 1000;
        lastTime = now;

        update(dt);
        draw();
        requestAnimationFrame(loop);
    }

    function update(dt) {
        timeLeft -= dt;
        if (timeLeft <= 0) { timeLeft = 0; gameState = 'END'; endGame(); }

        frame++;
        gridScroll = (gridScroll + 5 + score/500) % 60;

        // UI更新
        document.getElementById('timer-val').innerText = timeLeft.toFixed(2);
        document.getElementById('score-val').innerText = Math.floor(score).toString().padStart(6, '0');
        
        // コンボ時間とゲージの更新
        if (combo > 0) {
            comboTimer -= dt;
            if (comboTimer <= 0) {
                comboTimer = 0;
                combo = 0; // 時間経過によるコンボリセット
                document.getElementById('combo-stat').innerText = combo;
            }
            document.getElementById('combo-gauge').style.width = Math.max(0, (comboTimer / GAME_CONFIG.comboDuration) * 100) + '%';
            
            comboScale = Math.max(1, comboScale - 0.1);
            const cc = document.getElementById('combo-container');
            cc.style.opacity = Math.min(1, comboScale);
            document.getElementById('combo-num').style.transform = `scale(${comboScale})`;
        } else {
            document.getElementById('combo-gauge').style.width = '0%';
            document.getElementById('combo-container').style.opacity = '0';
        }

        // 敵・アイテム生成 (Math.random -> seededRandom)
        if (frame % 15 === 0) {
            const type = getRandomItemType();
            entities.push({
                x: seededRandom() * V_WIDTH, y: -50,
                type: type,
                speed: 8 + (score / 1000)
            });
        }

        // エンティティ更新
        for (let i = entities.length - 1; i >= 0; i--) {
            let e = entities[i];
            e.y += e.speed;

            const config = ITEM_CONFIG[e.type];
            const dist = Math.hypot(player.x - e.x, player.y - e.y);
            
            if (dist < player.r + config.size) { // 判定サイズをコンフィグ基準に
                handleCollision(e);
                entities.splice(i, 1);
            } else if (e.y > V_HEIGHT + 50) {
                // 取り逃がし時のコンボ切れを削除
                entities.splice(i, 1);
            }
        }

        // パーティクル更新
        particles.forEach((p, i) => {
            p.x += p.vx; p.y += p.vy; p.life -= 0.03;
            if (p.life <= 0) particles.splice(i, 1);
        });

        // プレイヤーのトレイル
        trail.push({x: player.x, y: player.y});
        if(trail.length > 15) trail.shift();
    }

    function handleCollision(e) {
        const config = ITEM_CONFIG[e.type];

        // スコア・時間の増減処理
        score += config.scorePlus;
        score -= config.scoreMinus;
        if (score < 0) score = 0; // スコアがマイナスにならないように保護
        
        timeLeft += config.timePlus;
        timeLeft -= config.timeMinus;

        // コンボ処理
        if (config.comboAction === 'add') {
            combo++;
            comboScale = 2.0;
            comboTimer = GAME_CONFIG.comboDuration; // コンボ時間をリセット
            // コンボボーナス (増やすスコアがある場合のみ加算)
            if (config.scorePlus > 0) score += (combo * 10);
            
            document.getElementById('combo-num').innerText = combo;
            document.getElementById('combo-stat').innerText = combo;
        } else if (config.comboAction === 'reset') {
            combo = 0;
            comboTimer = 0;
            shake = 20;
        }

        createExplosion(e.x, e.y, varColor(config.color));
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.save();
        
        // 画面揺れ (描画だけなのでFPS非依存の見た目処理としてMath.randomを残すか、乱数消費を防ぐため別途処理)
        // ※seededRandomを使うとFPS違いで乱数がズレるため、揺れは標準のMath.randomを使用します
        if (shake > 0) {
            ctx.translate((Math.random()-0.5)*shake, (Math.random()-0.5)*shake);
            shake *= 0.9;
        }
        
        ctx.scale(canvas.width / V_WIDTH, canvas.height / V_HEIGHT);

        // --- サイバーグリッド背景 (3Dパース) ---
        ctx.strokeStyle = 'rgba(0, 242, 255, 0.3)';
        ctx.lineWidth = 2;
        const horizon = V_HEIGHT * 0.3;
        for (let i = -V_WIDTH; i <= V_WIDTH*2; i += 80) {
            ctx.beginPath();
            ctx.moveTo(V_WIDTH/2, horizon);
            ctx.lineTo(i, V_HEIGHT);
            ctx.stroke();
        }
        // 横線
        for (let j = 0; j < 15; j++) {
            const y = horizon + Math.pow(j/15, 2) * (V_HEIGHT - horizon) + gridScroll;
            ctx.globalAlpha = (j / 15);
            ctx.beginPath();
            ctx.moveTo(0, y % V_HEIGHT); ctx.lineTo(V_WIDTH, y % V_HEIGHT);
            ctx.stroke();
        }
        ctx.globalAlpha = 1;

        // --- プレイヤー ---
        trail.forEach((t, i) => {
            ctx.globalAlpha = i / trail.length;
            ctx.fillStyle = i % 2 === 0 ? varColor('--neon-blue') : varColor('--neon-pink');
            ctx.beginPath(); ctx.arc(t.x, t.y, player.r * (i/trail.length), 0, Math.PI*2); ctx.fill();
        });
        ctx.globalAlpha = 1;
        ctx.shadowBlur = 20; ctx.shadowColor = '#fff';
        ctx.fillStyle = '#fff';
        ctx.beginPath(); ctx.arc(player.x, player.y, player.r, 0, Math.PI*2); ctx.fill();
        ctx.shadowBlur = 0;

        // --- エンティティ ---
        entities.forEach(e => {
            const config = ITEM_CONFIG[e.type];
            ctx.shadowBlur = 15;
            ctx.fillStyle = varColor(config.color);
            ctx.shadowColor = varColor(config.color);

            if (e.type === 'RED') {
                ctx.save(); ctx.translate(e.x, e.y); ctx.rotate(frame*0.1);
                ctx.fillRect(-config.size, -config.size, config.size*2, config.size*2); 
                ctx.restore();
            } else if (e.type === 'BLUE') {
                ctx.fillRect(e.x-config.size, e.y-config.size, config.size*2, config.size*2);
            } else {
                ctx.beginPath(); ctx.arc(e.x, e.y, config.size, 0, Math.PI*2); ctx.fill();
            }
        });

        // --- パーティクル ---
        particles.forEach(p => {
            ctx.globalAlpha = p.life;
            ctx.fillStyle = p.color;
            ctx.fillRect(p.x, p.y, 4, 4);
        });

        ctx.restore();
    }

    function varColor(name) { return getComputedStyle(document.documentElement).getPropertyValue(name).trim(); }

    function endGame() {
        document.getElementById('result-overlay').style.display = 'flex';
        document.getElementById('final-score').innerText = `RESULT: ${Math.floor(score)}`;
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEON DASH: FUTURE CITY</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-pink: #ff00ff;
            --neon-yellow: #fff200;
            --bg-dark: #050510;
        }
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background: #000; color: #fff;
            font-family: 'Share Tech Mono', monospace;
            display: flex; justify-content: center; align-items: center;
        }
        #game-container {
            position: relative; width: 100vw; max-width: calc(100vh * 16 / 9);
            height: 100vh; max-height: calc(100vw * 9 / 16);
            aspect-ratio: 16 / 9; background: radial-gradient(circle at 50% 50%, #101030 0%, #050510 100%);
            overflow: hidden;
        }
        canvas { display: block; width: 100%; height: 100%; }

        /* HUD */
        #hud {
            position: absolute; top: 0; left: 0; width: 100%; padding: 20px;
            pointer-events: none; z-index: 10;
            display: flex; justify-content: space-between; align-items: flex-start;
            box-sizing: border-box;
        }
        .hud-data {
            text-shadow: 0 0 10px var(--neon-blue);
            font-size: 1.5rem; letter-spacing: 2px;
        }
        #timer-val { color: var(--neon-pink); font-size: 2.5rem; text-shadow: 0 0 15px var(--neon-pink); }

        #combo-container {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none; text-align: center; z-index: 5;
            opacity: 0; transition: opacity 0.2s;
        }
        #combo-num {
            font-size: 8rem; font-style: italic; font-weight: 900;
            background: linear-gradient(to bottom, #fff 30%, var(--neon-yellow) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 20px var(--neon-yellow));
            margin: 0; line-height: 1;
        }
        .combo-label { font-size: 1.5rem; color: var(--neon-yellow); letter-spacing: 10px; }

        /* カウントダウン */
        #countdown {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 12rem; color: #fff; text-shadow: 0 0 30px var(--neon-blue);
            z-index: 100; pointer-events: none; display: none;
        }

        /* オーバーレイ */
        .overlay {
            position: absolute; inset: 0; background: rgba(0,0,10,0.9);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 200; backdrop-filter: blur(10px);
        }
        h1 { font-size: 4rem; margin: 0; background: linear-gradient(90deg, var(--neon-blue), var(--neon-pink)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .btn {
            margin-top: 20px; padding: 15px 60px; border: 1px solid var(--neon-blue);
            background: rgba(0, 242, 255, 0.1); color: var(--neon-blue);
            font-family: inherit; font-size: 1.5rem; cursor: pointer; transition: 0.3s;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
        }
        .btn:hover { background: var(--neon-blue); color: #000; box-shadow: 0 0 30px var(--neon-blue); }

        /* シード値入力 */
        #seed-input {
            margin-top: 15px; padding: 10px; background: rgba(0, 242, 255, 0.1); 
            border: 1px solid var(--neon-blue); color: var(--neon-blue); 
            font-family: inherit; font-size: 1.2rem; text-align: center; 
            outline: none; width: 220px; letter-spacing: 4px;
        }

        /* 詳細リザルト用 */
        .result-stats {
            display: flex; gap: 20px; margin: 15px 0; font-size: 1.2rem;
            color: rgba(255,255,255,0.8);
        }
        .stat-item span { font-weight: bold; }

        #game-container::after {
            content: ""; position: absolute; inset: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 4px, 3px 100%; pointer-events: none; z-index: 15;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="hud">
        <div>
            <div class="hud-data">SCORE: <span id="score-val">000000</span></div>
            <div class="hud-data" style="font-size: 1rem; opacity: 0.7;">COMBO: <span id="combo-stat">0</span></div>
        </div>
        <div id="timer-val">30.00</div>
    </div>

    <div id="combo-container">
        <p id="combo-num">0</p>
        <p class="combo-label">CHAIN</p>
        <div style="width: 100%; height: 6px; background: rgba(255, 242, 0, 0.2); margin-top: 10px;">
            <div id="combo-gauge" style="width: 100%; height: 100%; background: var(--neon-yellow);"></div>
        </div>
    </div>

    <div id="countdown"></div>

    <div id="start-overlay" class="overlay">
        <h1>NEON CITY DASH</h1>
        <p style="color: var(--neon-blue); opacity: 0.6; margin-bottom: 5px;">SYSTEM READY / NEURAL LINK ESTABLISHED</p>
        
        <div id="best-display" style="font-size: 1rem; color: var(--neon-yellow); margin-bottom: 20px; text-shadow: 0 0 5px var(--neon-yellow);">
            BEST: 000000 (SEED: ------ )
        </div>

        <input type="text" id="seed-input" maxlength="6" placeholder="SEED (6-DIGIT)" oninput="this.value=this.value.replace(/[^0-9]/g,'')">
        <button class="btn" onclick="startCountdown()">INITIALIZE</button>
    </div>

    <div id="result-overlay" class="overlay" style="display:none;">
        <h1 style="color: var(--neon-yellow); -webkit-text-fill-color: var(--neon-yellow); font-size: 3rem;">TERMINATED</h1>
        
        <div id="final-score" style="font-size: 3.5rem; margin-top: 10px; text-shadow: 0 0 20px var(--neon-yellow);">0</div>
        <div id="result-seed" style="color: var(--neon-blue); opacity: 0.7; margin-bottom: 10px;">SEED: 000000</div>

        <div class="result-stats">
            <div class="stat-item" style="color: var(--neon-blue);">🟦 <span id="stat-blue">0</span></div>
            <div class="stat-item" style="color: var(--neon-yellow);">🟩 <span id="stat-green">0</span></div>
            <div class="stat-item" style="color: var(--neon-pink);">🟥 <span id="stat-red">0</span></div>
        </div>

        <button class="btn" onclick="location.reload()">RE-SYNC</button>
    </div>

    <canvas id="gameCanvas"></canvas>
</div>

<script>
    /* =========================================
       ゲーム設定 & パラメータ
    ========================================= */
    const GAME_CONFIG = {
        comboDuration: 3.0,
    };

    /* =========================================
   ゲーム設定 & パラメータ (コードA準拠)
========================================= */
const ITEM_CONFIG = {
    // スコアアイテム：スコア+100
    BLUE:  { 
        size: 12, 
        weight: 35,      // コードAの出現頻度(25)を反映
        scorePlus: 100, 
        timePlus: 0, 
        scoreMinus: 0, 
        timeMinus: 0, 
        comboAction: 'add', 
        color: '--neon-blue', 
        label: '+100' 
    },
    // タイムアイテム：時間+3.0s
    GREEN: { 
        size: 18, 
        weight: 10,      // コードAの出現頻度(90)と確率(0.6)を考慮
        scorePlus: 0, 
        timePlus: 3.0, 
        scoreMinus: 0, 
        timeMinus: 0, 
        comboAction: 'add', 
        color: '--neon-yellow', 
        label: '+3.00s' 
    },
    // 邪魔者：時間-0.75s (コードBでは2.0sだったので緩和)
    RED:   { 
        size: 15, 
        weight: 55,      // コードAで最も頻繁に出る(12)ためウェイトを高く
        scorePlus: 0, 
        timePlus: 0, 
        scoreMinus: 0, 
        timeMinus: 0.75, // コードAの-0.75sを適用
        comboAction: 'reset', 
        color: '--neon-pink', 
        label: '-0.75s' 
    }
};
    /* =========================================
       シード乱数・保存システム
    ========================================= */
    let currentSeedNum = 0;
    let seedString = "";

    function initSeed(input) {
        if (!input || input.length === 0) {
            // 空欄の場合は6桁のランダム数字を生成
            input = Math.floor(100000 + Math.random() * 900000).toString();
        }
        seedString = input;
        currentSeedNum = parseInt(input);
    }

    // シード値に基づく疑似乱数
    function seededRandom() {
        currentSeedNum = (currentSeedNum * 9301 + 49297) % 233280;
        return currentSeedNum / 233280;
    }

    // アイテム抽選
    function getRandomItemType() {
        let totalWeight = Object.values(ITEM_CONFIG).reduce((sum, item) => sum + item.weight, 0);
        let r = seededRandom() * totalWeight;
        for (let type in ITEM_CONFIG) {
            if (r < ITEM_CONFIG[type].weight) return type;
            r -= ITEM_CONFIG[type].weight;
        }
        return 'BLUE';
    }

    // 自己ベストの保存と読み込み
    function saveBest(score, seed) {
        const best = localStorage.getItem('neon_dash_best') || 0;
        if (score > best) {
            localStorage.setItem('neon_dash_best', score);
            localStorage.setItem('neon_dash_seed', seed);
        }
    }

    function loadBest() {
        const best = localStorage.getItem('neon_dash_best') || 0;
        const seed = localStorage.getItem('neon_dash_seed') || "------";
        document.getElementById('best-display').innerText = `BEST: ${Math.floor(best).toString().padStart(6, '0')} (SEED: ${seed})`;
    }

    /* =========================================
       メインロジック
    ========================================= */
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const V_WIDTH = 1280, V_HEIGHT = 720;
    
    let score = 0, timeLeft = 30.00, combo = 0, comboScale = 1, comboTimer = 0;
    let gameState = 'START';
    let entities = [], particles = [], trail = [], popups = [];
    let stats = { blue: 0, green: 0, red: 0 };
    let player = { x: V_WIDTH/2, y: V_HEIGHT * 0.8, r: 15 };
    let frame = 0, gridScroll = 0, shake = 0;

    window.onload = loadBest;

    function resize() {
        const rect = canvas.parentElement.getBoundingClientRect();
        canvas.width = rect.width; canvas.height = rect.height;
    }
    window.addEventListener('resize', resize);
    resize();

    const updatePlayerPos = (e) => {
        if (gameState !== 'PLAYING') return;
        const rect = canvas.getBoundingClientRect();
        const clientX = e.clientX || (e.touches ? e.touches[0].clientX : 0);
        const clientY = e.clientY || (e.touches ? e.touches[0].clientY : 0);
        player.x = (clientX - rect.left) * (V_WIDTH / rect.width);
        player.y = (clientY - rect.top) * (V_HEIGHT / rect.height);
    };
    window.addEventListener('mousemove', updatePlayerPos);
    window.addEventListener('touchmove', e => { updatePlayerPos(e); e.preventDefault(); }, {passive:false});

    function startCountdown() {
        initSeed(document.getElementById('seed-input').value);
        document.getElementById('start-overlay').style.display = 'none';
        gameState = 'COUNTDOWN';
        const cd = document.getElementById('countdown');
        cd.style.display = 'block';
        let count = 3;
        const timer = setInterval(() => {
            if (count > 0) {
                cd.innerText = count;
                cd.style.opacity = '1';
                setTimeout(() => cd.style.opacity = '0', 500);
                count--;
            } else {
                cd.innerText = "GO!";
                cd.style.opacity = '1';
                setTimeout(() => cd.style.display = 'none', 500);
                gameState = 'PLAYING';
                lastTime = performance.now();
                loop();
                clearInterval(timer);
            }
        }, 1000);
    }

    function createExplosion(x, y, color) {
        for(let i=0; i<10; i++) {
            particles.push({ x, y, vx: (seededRandom()-0.5)*20, vy: (seededRandom()-0.5)*20, life: 1.0, color });
        }
    }

    function createPopup(x, y, text, color) {
        if (!text) return;
        popups.push({ x, y, text, color, life: 1.0, vy: -2 });
    }

    let lastTime = 0;
    function loop(now = performance.now()) {
        if (gameState !== 'PLAYING') return;
        const dt = (now - lastTime) / 1000;
        lastTime = now;
        update(dt);
        draw();
        requestAnimationFrame(loop);
    }

    function update(dt) {
        timeLeft -= dt;
        if (timeLeft <= 0) { timeLeft = 0; gameState = 'END'; endGame(); }

        frame++;
        gridScroll = (gridScroll + 5 + score/500) % 60;

        document.getElementById('timer-val').innerText = timeLeft.toFixed(2);
        document.getElementById('score-val').innerText = Math.floor(score).toString().padStart(6, '0');
        
        if (combo > 0) {
            comboTimer -= dt;
            if (comboTimer <= 0) { comboTimer = 0; combo = 0; }
            document.getElementById('combo-gauge').style.width = (comboTimer / GAME_CONFIG.comboDuration * 100) + '%';
            comboScale = Math.max(1, comboScale - 0.1);
            document.getElementById('combo-container').style.opacity = Math.min(1, comboScale);
            document.getElementById('combo-num').style.transform = `scale(${comboScale})`;
            document.getElementById('combo-num').innerText = combo;
            document.getElementById('combo-stat').innerText = combo;
        } else {
            document.getElementById('combo-gauge').style.width = '0%';
            document.getElementById('combo-container').style.opacity = '0';
        }

        if (frame % 15 === 0) {
            entities.push({
                x: seededRandom() * V_WIDTH, y: -50,
                type: getRandomItemType(),
                speed: 8 + (score / 1500)
            });
        }

        for (let i = entities.length - 1; i >= 0; i--) {
            let e = entities[i];
            e.y += e.speed;
            const config = ITEM_CONFIG[e.type];
            if (Math.hypot(player.x - e.x, player.y - e.y) < player.r + config.size) {
                handleCollision(e);
                entities.splice(i, 1);
            } else if (e.y > V_HEIGHT + 50) {
                entities.splice(i, 1);
            }
        }

        particles.forEach((p, i) => {
            p.x += p.vx; p.y += p.vy; p.life -= 0.03;
            if (p.life <= 0) particles.splice(i, 1);
        });

        popups.forEach((p, i) => {
            p.y += p.vy; p.life -= 0.02;
            if (p.life <= 0) popups.splice(i, 1);
        });

        trail.push({x: player.x, y: player.y});
        if(trail.length > 15) trail.shift();
    }

    function handleCollision(e) {
        const config = ITEM_CONFIG[e.type];
        score += config.scorePlus;
        timeLeft += config.timePlus;
        timeLeft -= config.timeMinus;

        if (config.comboAction === 'add') {
            combo++; comboScale = 2.0; comboTimer = GAME_CONFIG.comboDuration;
            if (config.scorePlus > 0) {
                score += (combo * 10);
                stats.blue++;
            } else {
                stats.green++;
            }
            createPopup(player.x, player.y - 30, config.label, varColor(config.color));
        } else if (config.comboAction === 'reset') {
            combo = 0; comboTimer = 0; shake = 20; stats.red++;
        }
        createExplosion(e.x, e.y, varColor(config.color));
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.save();
        if (shake > 0) { ctx.translate((Math.random()-0.5)*shake, (Math.random()-0.5)*shake); shake *= 0.9; }
        ctx.scale(canvas.width / V_WIDTH, canvas.height / V_HEIGHT);

        // 背景
        ctx.strokeStyle = 'rgba(0, 242, 255, 0.3)'; ctx.lineWidth = 2;
        const horizon = V_HEIGHT * 0.3;
        for (let i = -V_WIDTH; i <= V_WIDTH*2; i += 80) {
            ctx.beginPath(); ctx.moveTo(V_WIDTH/2, horizon); ctx.lineTo(i, V_HEIGHT); ctx.stroke();
        }
        for (let j = 0; j < 15; j++) {
            const y = horizon + Math.pow(j/15, 2) * (V_HEIGHT - horizon) + gridScroll;
            ctx.globalAlpha = (j / 15);
            ctx.beginPath(); ctx.moveTo(0, y % V_HEIGHT); ctx.lineTo(V_WIDTH, y % V_HEIGHT); ctx.stroke();
        }
        ctx.globalAlpha = 1;

        // プレイヤー
        trail.forEach((t, i) => {
            ctx.globalAlpha = i / trail.length;
            ctx.fillStyle = i % 2 === 0 ? varColor('--neon-blue') : varColor('--neon-pink');
            ctx.beginPath(); ctx.arc(t.x, t.y, player.r * (i/trail.length), 0, Math.PI*2); ctx.fill();
        });
        ctx.globalAlpha = 1; ctx.fillStyle = '#fff'; ctx.shadowBlur = 20; ctx.shadowColor = '#fff';
        ctx.beginPath(); ctx.arc(player.x, player.y, player.r, 0, Math.PI*2); ctx.fill(); ctx.shadowBlur = 0;

        // アイテム
        entities.forEach(e => {
            const config = ITEM_CONFIG[e.type];
            ctx.fillStyle = varColor(config.color); ctx.shadowBlur = 15; ctx.shadowColor = ctx.fillStyle;
            if (e.type === 'RED') {
                ctx.save(); ctx.translate(e.x, e.y); ctx.rotate(frame*0.1);
                ctx.fillRect(-config.size, -config.size, config.size*2, config.size*2); ctx.restore();
            } else if (e.type === 'BLUE') {
                ctx.fillRect(e.x-config.size, e.y-config.size, config.size*2, config.size*2);
            } else {
                ctx.beginPath(); ctx.arc(e.x, e.y, config.size, 0, Math.PI*2); ctx.fill();
            }
        });

        // ポップアップテキスト
        popups.forEach(p => {
            ctx.globalAlpha = p.life; ctx.fillStyle = p.color; ctx.font = "bold 24px 'Share Tech Mono'";
            ctx.textAlign = "center"; ctx.fillText(p.text, p.x, p.y);
        });

        // パーティクル
        particles.forEach(p => { ctx.globalAlpha = p.life; ctx.fillStyle = p.color; ctx.fillRect(p.x, p.y, 4, 4); });
        ctx.restore();
    }

    function varColor(name) { return getComputedStyle(document.documentElement).getPropertyValue(name).trim(); }

    function endGame() {
        saveBest(score, seedString);
        document.getElementById('result-overlay').style.display = 'flex';
        document.getElementById('final-score').innerText = Math.floor(score).toString().padStart(6, '0');
        document.getElementById('result-seed').innerText = `SEED: ${seedString}`;
        document.getElementById('stat-blue').innerText = stats.blue;
        document.getElementById('stat-green').innerText = stats.green;
        document.getElementById('stat-red').innerText = stats.red;
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>NEON DASH - BOOSTED</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #0a0a0a;
            font-family: 'Arial', sans-serif;
            color: #fff;
            user-select: none;
            touch-action: none;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: none;
            z-index: 10;
        }
        #timer { font-size: 2em; color: #ff3e3e; text-shadow: 0 0 10px #f00; }
        #score { font-size: 1.5em; color: #00f2ff; }
        #highScore { font-size: 1em; color: #aaa; }
        #level { font-size: 1.2em; color: #ffeb3b; }
        
        #overlay {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            background: rgba(0,0,0,0.9);
            padding: 40px;
            border: 2px solid #00f2ff;
            border-radius: 20px;
            display: block;
            z-index: 100;
        }
        button {
            background: #00f2ff;
            border: none;
            padding: 15px 30px;
            font-size: 1.2em;
            cursor: pointer;
            border-radius: 5px;
            font-weight: bold;
            transition: 0.2s;
        }
        button:hover { background: #fff; transform: scale(1.1); }
        canvas { display: block; }

        /* 被弾時の画面フラッシュ用レイヤー */
        #damage-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            box-shadow: inset 0 0 100px rgba(255, 0, 0, 0);
            pointer-events: none;
            z-index: 5;
            transition: box-shadow 0.1s;
        }
    </style>
</head>
<body>

<div id="damage-overlay"></div>

<div id="ui">
    <div id="timer">TIME: 30</div>
    <div id="score">SCORE: 0</div>
    <div id="level">LV: 1</div>
    <div id="highScore">BEST: 0</div>
</div>

<div id="overlay">
    <h1 id="msg">NEON DASH v2</h1>
    <p>🔴 避ける(-50) / 🔵 スコア(+100)<br>🟢 レア：時間回復(+5秒)</p>
    <button onclick="startGame()">START GAME</button>
</div>

<canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const timerEl = document.getElementById('timer');
    const scoreEl = document.getElementById('score');
    const levelEl = document.getElementById('level');
    const highScoreEl = document.getElementById('highScore');
    const overlay = document.getElementById('overlay');
    const damageOverlay = document.getElementById('damage-overlay');
    const msg = document.getElementById('msg');

    let score = 0;
    let level = 1;
    let timeLeft = 30;
    let gameActive = false;
    let player = { x: 0, y: 0, r: 15 };
    let enemies = [];
    let items = [];
    let timeItems = []; // 緑のアイテム
    let particles = [];
    let floatingTexts = []; // ポップアップスコア
    let frameCount = 0;

    let bestScore = localStorage.getItem('neonDashBest_v2') || 0;
    highScoreEl.innerText = `BEST: ${bestScore}`;

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    window.addEventListener('mousemove', e => { player.x = e.clientX; player.y = e.clientY; });
    window.addEventListener('touchmove', e => {
        player.x = e.touches[0].clientX;
        player.y = e.touches[0].clientY;
        e.preventDefault();
    }, { passive: false });

    function startGame() {
        score = 0;
        level = 1;
        timeLeft = 30;
        enemies = [];
        items = [];
        timeItems = [];
        particles = [];
        floatingTexts = [];
        gameActive = true;
        overlay.style.display = 'none';
        
        let timerId = setInterval(() => {
            if (!gameActive) {
                clearInterval(timerId);
                return;
            }
            timeLeft--;
            if (timeLeft <= 0) {
                timeLeft = 0;
                endGame();
            }
            timerEl.innerText = `TIME: ${timeLeft}`;
        }, 1000);
        update();
    }

    function spawnEntity() {
        frameCount++;
        // 敵
        if (frameCount % Math.max(2, (15 - level)) === 0) {
            enemies.push({ x: Math.random() * canvas.width, y: -20, speed: 4 + level + Math.random() * 4, r: 12 });
        }
        // 通常アイテム（青）
        if (frameCount % 30 === 0) {
            items.push({ x: Math.random() * canvas.width, y: -20, speed: 4, r: 10 });
        }
        // レアタイムアイテム（緑）- 約5~6秒に1回程度の確率
        if (frameCount % 300 === 0 && Math.random() > 0.3) {
            timeItems.push({ x: Math.random() * canvas.width, y: -20, speed: 5, r: 12 });
        }
    }

    function triggerDamageEffect(val) {
        // 画面フラッシュ
        damageOverlay.style.boxShadow = "inset 0 0 100px rgba(255, 0, 0, 0.8)";
        setTimeout(() => { damageOverlay.style.boxShadow = "inset 0 0 0px rgba(255, 0, 0, 0)"; }, 150);
        // 数値ポップアップ
        addFloatingText(player.x, player.y - 20, `-${val}`, "#ff3e3e");
    }

    function addFloatingText(x, y, text, color) {
        floatingTexts.push({ x, y, text, color, life: 1.0 });
    }

    function update() {
        if (!gameActive) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        spawnEntity();

        // 自機
        ctx.shadowBlur = 15;
        ctx.shadowColor = "#00f2ff";
        ctx.fillStyle = "#00f2ff";
        ctx.beginPath();
        ctx.arc(player.x, player.y, player.r, 0, Math.PI * 2);
        ctx.fill();

        // 敵（赤）
        ctx.shadowColor = "#ff3e3e";
        ctx.fillStyle = "#ff3e3e";
        enemies.forEach((en, i) => {
            en.y += en.speed;
            ctx.beginPath();
            ctx.arc(en.x, en.y, en.r, 0, Math.PI * 2);
            ctx.fill();
            if (Math.hypot(player.x - en.x, player.y - en.y) < player.r + en.r) {
                const penalty = 50;
                score = Math.max(0, score - penalty);
                triggerDamageEffect(penalty);
                enemies.splice(i, 1);
            }
            if (en.y > canvas.height) enemies.splice(i, 1);
        });

        // 青アイテム
        ctx.shadowColor = "#00f2ff";
        ctx.fillStyle = "#00f2ff";
        items.forEach((it, i) => {
            it.y += it.speed;
            ctx.fillRect(it.x - it.r, it.y - it.r, it.r * 2, it.r * 2);
            if (Math.hypot(player.x - it.x, player.y - it.y) < player.r + it.r) {
                score += 100;
                addFloatingText(it.x, it.y, "+100", "#00f2ff");
                items.splice(i, 1);
                checkLevelUp();
            }
            if (it.y > canvas.height) items.splice(i, 1);
        });

        // 緑アイテム（タイム回復）
        ctx.shadowColor = "#00ff00";
        ctx.fillStyle = "#00ff00";
        timeItems.forEach((ti, i) => {
            ti.y += ti.speed;
            // 菱形にする
            ctx.beginPath();
            ctx.moveTo(ti.x, ti.y - ti.r);
            ctx.lineTo(ti.x + ti.r, ti.y);
            ctx.lineTo(ti.x, ti.y + ti.r);
            ctx.lineTo(ti.x - ti.r, ti.y);
            ctx.closePath();
            ctx.fill();

            if (Math.hypot(player.x - ti.x, player.y - ti.y) < player.r + ti.r) {
                timeLeft += 5;
                timerEl.innerText = `TIME: ${timeLeft}`;
                addFloatingText(ti.x, ti.y, "+5 SEC", "#00ff00");
                timeItems.splice(i, 1);
                // 画面を緑に光らせる
                damageOverlay.style.boxShadow = "inset 0 0 50px rgba(0, 255, 0, 0.5)";
                setTimeout(() => { damageOverlay.style.boxShadow = "inset 0 0 0px rgba(0, 255, 0, 0)"; }, 200);
            }
            if (ti.y > canvas.height) timeItems.splice(i, 1);
        });

        // 浮遊テキスト描画
        ctx.shadowBlur = 0;
        floatingTexts.forEach((ft, i) => {
            ft.y -= 2;
            ft.life -= 0.02;
            ctx.globalAlpha = ft.life;
            ctx.fillStyle = ft.color;
            ctx.font = "bold 20px Arial";
            ctx.fillText(ft.text, ft.x - 20, ft.y);
            if (ft.life <= 0) floatingTexts.splice(i, 1);
        });
        ctx.globalAlpha = 1.0;

        scoreEl.innerText = `SCORE: ${score}`;
        requestAnimationFrame(update);
    }

    function checkLevelUp() {
        let nextLevel = Math.floor(score / 1000) + 1;
        if (nextLevel > level) {
            level = nextLevel;
            levelEl.innerText = `LV: ${level}`;
            addFloatingText(player.x, player.y - 40, "LEVEL UP!", "#ffeb3b");
        }
    }

    function endGame() {
        gameActive = false;
        overlay.style.display = 'block';
        msg.innerHTML = `GAME OVER<br>SCORE: ${score}`;
        
        if (score > bestScore) {
            bestScore = score;
            localStorage.setItem('neonDashBest_v2', bestScore);
            highScoreEl.innerText = `BEST: ${bestScore}`;
            msg.innerHTML += "<br><span style='color:#ffeb3b'>NEW RECORD!</span>";
        }
    }
</script>
</body>
</html>

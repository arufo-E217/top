<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEON DASH - CUSTOMIZABLE</title>
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-red: #ff3e3e;
            --neon-green: #00ff00;
            --neon-yellow: #ffeb3b;
        }
        /* ページ全体を固定し、スクロールを禁止 */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; 
            background: #050505;
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: flex-start; /* 上端に合わせる */
        }

        #game-container {
            position: relative;
            width: 100vw;
            max-width: calc(100vh * 16 / 9);
            aspect-ratio: 16 / 9;
            background: #0a0a0a;
            border-bottom: 2px solid #333;
            box-sizing: border-box;
            overflow: hidden;
        }

        canvas { display: block; width: 100%; height: 100%; }

        #ui-layer {
            position: absolute;
            top: 10px;
            left: 15px;
            pointer-events: none;
            z-index: 10;
        }
        .stat-item { margin-bottom: 2px; }
        #timer { font-size: 1.8rem; color: var(--neon-red); text-shadow: 0 0 10px #f00; }
        #score { font-size: 1.2rem; color: var(--neon-blue); }
        #best-info { font-size: 0.8rem; color: #888; }

        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            text-align: center;
        }

        h1 { margin-bottom: 10px; color: var(--neon-blue); font-size: 2.5rem; }
        .input-group { margin: 15px 0; }
        input {
            background: #222;
            border: 1px solid var(--neon-blue);
            color: #fff;
            padding: 12px;
            font-size: 1.2rem;
            width: 180px;
            text-align: center;
            border-radius: 5px;
            outline: none;
        }
        button {
            background: var(--neon-blue);
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            transition: 0.2s;
        }
        button:active { transform: scale(0.95); }

        .result-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px 20px;
            margin: 15px 0;
            font-size: 1rem;
        }
        .res-val { font-weight: bold; text-align: left; }
        .res-label { text-align: right; }

        #damage-flash {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 5;
            transition: box-shadow 0.1s;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="damage-flash"></div>
    <div id="ui-layer">
        <div id="timer" class="stat-item">TIME: 30</div>
        <div id="score" class="stat-item">SCORE: 0</div>
        <div id="best-info" class="stat-item">BEST: 0 (Seed: ---)</div>
    </div>

    <div id="start-overlay" class="overlay">
        <h1>NEON DASH</h1>
        <div class="input-group">
            <label style="display:block; font-size: 0.8rem; color:#888; margin-bottom:5px;">SEED (6 DIGITS):</label>
            <input type="number" id="seed-input" placeholder="RANDOM" pattern="\d*">
        </div>
        <button onclick="initGame()">GAME START</button>
    </div>

    <div id="result-overlay" class="overlay" style="display:none;">
        <h1 id="result-title">FINISH!</h1>
        <div class="result-grid">
            <span class="res-label">SCORE:</span><span id="res-score" class="res-val" style="color:var(--neon-blue)">0</span>
            <span class="res-label">BLUE (+100):</span><span id="res-blue" class="res-val">0</span>
            <span class="res-label">TIME (+5s):</span><span id="res-green" class="res-val" style="color:var(--neon-green)">0</span>
            <span class="res-label">HIT (-50):</span><span id="res-red" class="res-val" style="color:var(--neon-red)">0</span>
            <span class="res-label">SEED:</span><span id="res-seed" class="res-val">0</span>
        </div>
        <div id="new-record" style="color:var(--neon-yellow); margin-bottom:10px; font-weight:bold; display:none;">NEW RECORD!</div>
        <button onclick="showStart()">BACK TO MENU</button>
    </div>

    <canvas id="gameCanvas"></canvas>
</div>

<script>
    // ==========================================
    //  ゲームバランス調整用設定 (ここをいじる)
    // ==========================================
    const GAME_CONFIG = {
        INITIAL_TIME: 30,         // 初期時間
        TIME_GAIN: 5,             // 緑アイテム取得時の回復秒数
        PENALTY_SCORE: 50,        // 被弾時のスコア減点
        SCORE_BLUE: 100,          // 青アイテムの得点
        
        // 出現頻度（数字が小さいほどたくさん出る）
        SPAWN_RATE_ENEMY: 12,     // 敵（赤）の基本出現間隔（フレーム単位）
        SPAWN_RATE_BLUE: 25,      // 青アイテムの出現間隔
        SPAWN_RATE_GREEN: 300,    // 緑アイテムの出現間隔
        
        // 緑アイテムが出る確率 (0.0 〜 1.0)
        CHANCE_GREEN: 0.5,
        
        // レベルアップのしきい値 (このスコアごとに難易度アップ)
        LEVEL_UP_STEP: 1500
    };

    // ==========================================
    //  システム変数
    // ==========================================
    function createPRNG(seed) {
        return function() {
            let t = seed += 0x6D2B79F5;
            t = Math.imul(t ^ t >>> 15, t | 1);
            t ^= t + Math.imul(t ^ t >>> 7, t | 61);
            return ((t ^ t >>> 14) >>> 0) / 4294967296;
        };
    }

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const container = document.getElementById('game-container');
    const V_WIDTH = 1280, V_HEIGHT = 720;

    let score = 0, timeLeft = 0, level = 1, gameActive = false;
    let countBlue = 0, countGreen = 0, countRed = 0;
    let currentSeed = 0, rnd = null;
    let player = { x: V_WIDTH/2, y: V_HEIGHT/2, r: 18 };
    let enemies = [], items = [], timeItems = [], floatingTexts = [], frameCount = 0;

    let bestData = JSON.parse(localStorage.getItem('neonDashBestData_v4')) || { score: 0, seed: '---' };
    updateBestUI();

    // スクロールズレ防止：入力を終えた時や開始時にトップへ戻す
    function scrollToTop() {
        window.scrollTo(0, 0);
        document.body.scrollTop = 0;
    }

    // 入力フォームからフォーカスが外れたらスクロールをリセット
    document.getElementById('seed-input').addEventListener('blur', scrollToTop);

    function resize() {
        const rect = container.getBoundingClientRect();
        canvas.width = rect.width;
        canvas.height = rect.height;
        scrollToTop();
    }
    window.addEventListener('resize', resize);
    resize();

    function getVirtualPos(e) {
        const rect = container.getBoundingClientRect();
        let clientX = e.clientX || (e.touches ? e.touches[0].clientX : 0);
        let clientY = e.clientY || (e.touches ? e.touches[0].clientY : 0);
        return {
            x: (clientX - rect.left) * (V_WIDTH / rect.width),
            y: (clientY - rect.top) * (V_HEIGHT / rect.height)
        };
    }

    const moveHandler = e => {
        if (!gameActive) return;
        const pos = getVirtualPos(e);
        player.x = pos.x; player.y = pos.y;
    };
    window.addEventListener('mousemove', moveHandler);
    window.addEventListener('touchmove', e => {
        moveHandler(e);
        e.preventDefault();
    }, { passive: false });

    function showStart() {
        scrollToTop();
        document.getElementById('result-overlay').style.display = 'none';
        document.getElementById('start-overlay').style.display = 'flex';
    }

    function initGame() {
        scrollToTop();
        const seedInput = document.getElementById('seed-input').value;
        currentSeed = seedInput ? parseInt(seedInput.substring(0,6)) : Math.floor(Math.random() * 899999) + 100000;
        rnd = createPRNG(currentSeed);
        
        score = 0; level = 1; frameCount = 0;
        timeLeft = GAME_CONFIG.INITIAL_TIME;
        countBlue = 0; countGreen = 0; countRed = 0;
        enemies = []; items = []; timeItems = []; floatingTexts = [];
        
        document.getElementById('start-overlay').style.display = 'none';
        gameActive = true;
        
        let timerId = setInterval(() => {
            if (!gameActive) { clearInterval(timerId); return; }
            timeLeft--;
            if (timeLeft <= 0) { timeLeft = 0; endGame(); }
            document.getElementById('timer').innerText = `TIME: ${timeLeft}`;
        }, 1000);

        update();
    }

    function spawnLogic() {
        frameCount++;
        // 敵の出現
        if (frameCount % Math.max(2, (GAME_CONFIG.SPAWN_RATE_ENEMY - level)) === 0) {
            enemies.push({ x: rnd() * V_WIDTH, y: -30, speed: 5 + level + rnd() * 5, r: 15 });
        }
        // 青アイテムの出現
        if (frameCount % GAME_CONFIG.SPAWN_RATE_BLUE === 0) {
            items.push({ x: rnd() * V_WIDTH, y: -30, speed: 4 + rnd() * 2, r: 12 });
        }
        // 緑アイテムの出現
        if (frameCount % GAME_CONFIG.SPAWN_RATE_GREEN === 0 && rnd() < GAME_CONFIG.CHANCE_GREEN) {
            timeItems.push({ x: rnd() * V_WIDTH, y: -30, speed: 6, r: 16 });
        }
    }

    function update() {
        if (!gameActive) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.save();
        ctx.scale(canvas.width / V_WIDTH, canvas.height / V_HEIGHT);

        spawnLogic();

        // プレイヤー
        ctx.shadowBlur = 15; ctx.shadowColor = varColor('--neon-blue');
        ctx.fillStyle = varColor('--neon-blue');
        ctx.beginPath(); ctx.arc(player.x, player.y, player.r, 0, Math.PI * 2); ctx.fill();

        // 敵 (赤)
        ctx.shadowColor = varColor('--neon-red'); ctx.fillStyle = varColor('--neon-red');
        enemies.forEach((en, i) => {
            en.y += en.speed;
            ctx.beginPath(); ctx.arc(en.x, en.y, en.r, 0, Math.PI * 2); ctx.fill();
            if (Math.hypot(player.x - en.x, player.y - en.y) < player.r + en.r) {
                score = Math.max(0, score - GAME_CONFIG.PENALTY_SCORE);
                flashScreen("rgba(255, 0, 0, 0.7)");
                addText(player.x, player.y - 20, `-${GAME_CONFIG.PENALTY_SCORE}`, varColor('--neon-red'));
                countRed++; enemies.splice(i, 1);
            } else if (en.y > V_HEIGHT + 50) enemies.splice(i, 1);
        });

        // 青
        ctx.shadowColor = varColor('--neon-blue'); ctx.fillStyle = varColor('--neon-blue');
        items.forEach((it, i) => {
            it.y += it.speed;
            ctx.fillRect(it.x - it.r, it.y - it.r, it.r * 2, it.r * 2);
            if (Math.hypot(player.x - it.x, player.y - it.y) < player.r + it.r) {
                score += GAME_CONFIG.SCORE_BLUE; countBlue++;
                addText(it.x, it.y, `+${GAME_CONFIG.SCORE_BLUE}`, varColor('--neon-blue'));
                items.splice(i, 1); checkLevel();
            } else if (it.y > V_HEIGHT + 50) items.splice(i, 1);
        });

        // 緑
        ctx.shadowColor = varColor('--neon-green'); ctx.fillStyle = varColor('--neon-green');
        timeItems.forEach((ti, i) => {
            ti.y += ti.speed;
            ctx.beginPath();
            ctx.moveTo(ti.x, ti.y - ti.r); ctx.lineTo(ti.x + ti.r, ti.y);
            ctx.lineTo(ti.x, ti.y + ti.r); ctx.lineTo(ti.x - ti.r, ti.y);
            ctx.closePath(); ctx.fill();
            if (Math.hypot(player.x - ti.x, player.y - ti.y) < player.r + ti.r) {
                timeLeft += GAME_CONFIG.TIME_GAIN; countGreen++;
                addText(ti.x, ti.y, `+${GAME_CONFIG.TIME_GAIN} SEC`, varColor('--neon-green'));
                timeItems.splice(i, 1); flashScreen("rgba(0, 255, 0, 0.4)");
            } else if (ti.y > V_HEIGHT + 50) timeItems.splice(i, 1);
        });

        // テキスト
        ctx.shadowBlur = 0;
        floatingTexts.forEach((ft, i) => {
            ft.y -= 2; ft.life -= 0.02;
            ctx.globalAlpha = ft.life; ctx.fillStyle = ft.color; ctx.font = "bold 26px Arial";
            ctx.fillText(ft.text, ft.x - 30, ft.y);
            if (ft.life <= 0) floatingTexts.splice(i, 1);
        });
        ctx.globalAlpha = 1.0;

        ctx.restore();
        document.getElementById('score').innerText = `SCORE: ${score}`;
        requestAnimationFrame(update);
    }

    function varColor(name) { return getComputedStyle(document.documentElement).getPropertyValue(name).trim(); }
    function flashScreen(color) {
        const flash = document.getElementById('damage-flash');
        flash.style.boxShadow = `inset 0 0 100px ${color}`;
        setTimeout(() => flash.style.boxShadow = "none", 150);
    }
    function addText(x, y, text, color) { floatingTexts.push({ x, y, text, color, life: 1.0 }); }
    function checkLevel() { level = Math.floor(score / GAME_CONFIG.LEVEL_UP_STEP) + 1; }
    function updateBestUI() { document.getElementById('best-info').innerText = `BEST: ${bestData.score} (Seed: ${bestData.seed})`; }

    function endGame() {
        gameActive = false;
        scrollToTop();
        document.getElementById('result-overlay').style.display = 'flex';
        document.getElementById('res-score').innerText = score;
        document.getElementById('res-blue').innerText = countBlue;
        document.getElementById('res-green').innerText = countGreen;
        document.getElementById('res-red').innerText = countRed;
        document.getElementById('res-seed').innerText = currentSeed;

        const newRecordMsg = document.getElementById('new-record');
        if (score > bestData.score) {
            bestData = { score: score, seed: currentSeed };
            localStorage.setItem('neonDashBestData_v4', JSON.stringify(bestData));
            updateBestUI();
            newRecordMsg.style.display = 'block';
        } else {
            newRecordMsg.style.display = 'none';
        }
    }
</script>
</body>
</html>

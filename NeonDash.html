<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEON DASH - STRATEGY</title>
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-red: #ff3e3e;
            --neon-green: #00ff00;
            --neon-yellow: #ffeb3b;
        }
        body {
            margin: 0;
            padding: 0;
            background: #050505;
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            touch-action: none;
        }

        /* 16:9のプレイエリアコンテナ */
        #game-container {
            position: relative;
            width: 100vw;
            max-width: calc(100vh * 16 / 9);
            aspect-ratio: 16 / 9;
            background: #0a0a0a;
            border: 2px solid #333;
            box-sizing: border-box;
            overflow: hidden;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #ui-layer {
            position: absolute;
            top: 10px;
            left: 15px;
            pointer-events: none;
            z-index: 10;
        }
        .stat-item { margin-bottom: 2px; }
        #timer { font-size: 1.8rem; color: var(--neon-red); text-shadow: 0 0 10px #f00; }
        #score { font-size: 1.2rem; color: var(--neon-blue); }
        #best-info { font-size: 0.8rem; color: #888; }

        /* オーバーレイ共通 */
        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            text-align: center;
        }

        h1 { margin-bottom: 10px; color: var(--neon-blue); }
        .input-group { margin: 15px 0; }
        input {
            background: #222;
            border: 1px solid var(--neon-blue);
            color: #fff;
            padding: 10px;
            font-size: 1rem;
            width: 150px;
            text-align: center;
            border-radius: 5px;
        }
        button {
            background: var(--neon-blue);
            border: none;
            padding: 12px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            transition: 0.2s;
        }
        button:hover { transform: scale(1.05); filter: brightness(1.2); }

        .result-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin: 15px 0;
            font-size: 1rem;
        }
        .res-val { font-weight: bold; }

        #damage-flash {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 5;
            transition: box-shadow 0.1s;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="damage-flash"></div>
    <div id="ui-layer">
        <div id="timer" class="stat-item">TIME: 30</div>
        <div id="score" class="stat-item">SCORE: 0</div>
        <div id="best-info" class="stat-item">BEST: 0 (Seed: ---)</div>
    </div>

    <div id="start-overlay" class="overlay">
        <h1>NEON DASH</h1>
        <p>16:9 FIXED AREA / SEEDED PATTERN</p>
        <div class="input-group">
            <label style="display:block; font-size: 0.8rem; color:#888;">SEED (6 digits or blank):</label>
            <input type="number" id="seed-input" placeholder="RANDOM" maxlength="6">
        </div>
        <button onclick="initGame()">GAME START</button>
    </div>

    <div id="result-overlay" class="overlay" style="display:none;">
        <h1 id="result-title">FINISH!</h1>
        <div class="result-grid">
            <span>SCORE:</span><span id="res-score" class="res-val" style="color:var(--neon-blue)">0</span>
            <span>BLUE (+100):</span><span id="res-blue" class="res-val">0</span>
            <span>TIME UP (+5s):</span><span id="res-green" class="res-val" style="color:var(--neon-green)">0</span>
            <span>HIT (-50):</span><span id="res-red" class="res-val" style="color:var(--neon-red)">0</span>
            <span>SEED USED:</span><span id="res-seed" class="res-val">0</span>
        </div>
        <div id="new-record" style="color:var(--neon-yellow); margin-bottom:10px; font-weight:bold; display:none;">NEW RECORD!</div>
        <button onclick="showStart()">BACK TO MENU</button>
    </div>

    <canvas id="gameCanvas"></canvas>
</div>

<script>
    // --- SEED-BASED PRNG (mulberry32) ---
    function createPRNG(seed) {
        return function() {
            let t = seed += 0x6D2B79F5;
            t = Math.imul(t ^ t >>> 15, t | 1);
            t ^= t + Math.imul(t ^ t >>> 7, t | 61);
            return ((t ^ t >>> 14) >>> 0) / 4294967296;
        };
    }

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const container = document.getElementById('game-container');
    
    // 定数（仮想解像度を1280x720として内部計算）
    const V_WIDTH = 1280;
    const V_HEIGHT = 720;

    let score = 0, timeLeft = 30, level = 1, gameActive = false;
    let countBlue = 0, countGreen = 0, countRed = 0;
    let currentSeed = 0, rnd = null;
    let player = { x: V_WIDTH/2, y: V_HEIGHT/2, r: 18 };
    let enemies = [], items = [], timeItems = [], particles = [], floatingTexts = [];
    let frameCount = 0;

    // ハイスコアデータ
    let bestData = JSON.parse(localStorage.getItem('neonDashBestData_v3')) || { score: 0, seed: '---' };
    updateBestUI();

    function resize() {
        // キャンバスのピクセルサイズをコンテナの表示サイズに合わせる
        const rect = container.getBoundingClientRect();
        canvas.width = rect.width;
        canvas.height = rect.height;
    }
    window.addEventListener('resize', resize);
    resize();

    // 座標変換 (スクリーン座標 -> 仮想1280x720座標)
    function getVirtualPos(e) {
        const rect = container.getBoundingClientRect();
        let clientX = e.clientX || (e.touches ? e.touches[0].clientX : 0);
        let clientY = e.clientY || (e.touches ? e.touches[0].clientY : 0);
        return {
            x: (clientX - rect.left) * (V_WIDTH / rect.width),
            y: (clientY - rect.top) * (V_HEIGHT / rect.height)
        };
    }

    window.addEventListener('mousemove', e => {
        if (!gameActive) return;
        const pos = getVirtualPos(e);
        player.x = pos.x; player.y = pos.y;
    });
    window.addEventListener('touchmove', e => {
        if (!gameActive) return;
        const pos = getVirtualPos(e);
        player.x = pos.x; player.y = pos.y;
        e.preventDefault();
    }, { passive: false });

    function showStart() {
        document.getElementById('result-overlay').style.display = 'none';
        document.getElementById('start-overlay').style.display = 'flex';
    }

    function initGame() {
        const seedInput = document.getElementById('seed-input').value;
        currentSeed = seedInput ? parseInt(seedInput) : Math.floor(Math.random() * 899999) + 100000;
        rnd = createPRNG(currentSeed);
        
        score = 0; timeLeft = 30; level = 1;
        countBlue = 0; countGreen = 0; countRed = 0;
        frameCount = 0;
        enemies = []; items = []; timeItems = []; particles = []; floatingTexts = [];
        
        document.getElementById('start-overlay').style.display = 'none';
        gameActive = true;
        
        let timerId = setInterval(() => {
            if (!gameActive) { clearInterval(timerId); return; }
            timeLeft--;
            if (timeLeft <= 0) { timeLeft = 0; endGame(); }
            document.getElementById('timer').innerText = `TIME: ${timeLeft}`;
        }, 1000);

        update();
    }

    function update() {
        if (!gameActive) return;
        
        // 描画準備（仮想解像度に合わせてスケール調整）
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.save();
        ctx.scale(canvas.width / V_WIDTH, canvas.height / V_HEIGHT);

        spawnLogic();

        // プレイヤー描画
        ctx.shadowBlur = 15; ctx.shadowColor = "#00f2ff";
        ctx.fillStyle = "#00f2ff";
        ctx.beginPath(); ctx.arc(player.x, player.y, player.r, 0, Math.PI * 2); ctx.fill();

        // 敵 (赤)
        ctx.shadowColor = "#ff3e3e"; ctx.fillStyle = "#ff3e3e";
        enemies.forEach((en, i) => {
            en.y += en.speed;
            ctx.beginPath(); ctx.arc(en.x, en.y, en.r, 0, Math.PI * 2); ctx.fill();
            if (Math.hypot(player.x - en.x, player.y - en.y) < player.r + en.r) {
                hitEffect(50); countRed++;
                enemies.splice(i, 1);
            }
            if (en.y > V_HEIGHT + 50) enemies.splice(i, 1);
        });

        // 青アイテム
        ctx.shadowColor = "#00f2ff"; ctx.fillStyle = "#00f2ff";
        items.forEach((it, i) => {
            it.y += it.speed;
            ctx.fillRect(it.x - it.r, it.y - it.r, it.r * 2, it.r * 2);
            if (Math.hypot(player.x - it.x, player.y - it.y) < player.r + it.r) {
                score += 100; countBlue++;
                addText(it.x, it.y, "+100", "#00f2ff");
                items.splice(i, 1);
                checkLevel();
            }
            if (it.y > V_HEIGHT + 50) items.splice(i, 1);
        });

        // 緑アイテム
        ctx.shadowColor = "#00ff00"; ctx.fillStyle = "#00ff00";
        timeItems.forEach((ti, i) => {
            ti.y += ti.speed;
            ctx.beginPath();
            ctx.moveTo(ti.x, ti.y - ti.r); ctx.lineTo(ti.x + ti.r, ti.y);
            ctx.lineTo(ti.x, ti.y + ti.r); ctx.lineTo(ti.x - ti.r, ti.y);
            ctx.closePath(); ctx.fill();
            if (Math.hypot(player.x - ti.x, player.y - ti.y) < player.r + ti.r) {
                timeLeft += 5; countGreen++;
                addText(ti.x, ti.y, "+5 SEC", "#00ff00");
                timeItems.splice(i, 1);
                flashScreen("rgba(0, 255, 0, 0.4)");
            }
            if (ti.y > V_HEIGHT + 50) timeItems.splice(i, 1);
        });

        // 浮遊テキスト
        ctx.shadowBlur = 0;
        floatingTexts.forEach((ft, i) => {
            ft.y -= 2; ft.life -= 0.02;
            ctx.globalAlpha = ft.life;
            ctx.fillStyle = ft.color;
            ctx.font = "bold 24px Arial";
            ctx.fillText(ft.text, ft.x - 30, ft.y);
            if (ft.life <= 0) floatingTexts.splice(i, 1);
        });
        ctx.globalAlpha = 1.0;

        ctx.restore();
        document.getElementById('score').innerText = `SCORE: ${score}`;
        requestAnimationFrame(update);
    }

    function spawnLogic() {
        frameCount++;
        // シード値に基づいた乱数 rnd() を使用
        if (frameCount % Math.max(3, (12 - level)) === 0) {
            enemies.push({ x: rnd() * V_WIDTH, y: -30, speed: 5 + level + rnd() * 5, r: 15 });
        }
        if (frameCount % 40 === 0) {
            items.push({ x: rnd() * V_WIDTH, y: -30, speed: 4 + rnd() * 2, r: 12 });
        }
        if (frameCount % 360 === 0 && rnd() > 0.4) {
            timeItems.push({ x: rnd() * V_WIDTH, y: -30, speed: 6, r: 15 });
        }
    }

    function hitEffect(val) {
        score = Math.max(0, score - val);
        flashScreen("rgba(255, 0, 0, 0.7)");
        addText(player.x, player.y - 20, `-${val}`, "#ff3e3e");
    }

    function flashScreen(color) {
        const flash = document.getElementById('damage-flash');
        flash.style.boxShadow = `inset 0 0 100px ${color}`;
        setTimeout(() => flash.style.boxShadow = "none", 150);
    }

    function addText(x, y, text, color) {
        floatingTexts.push({ x, y, text, color, life: 1.0 });
    }

    function checkLevel() {
        level = Math.floor(score / 1500) + 1;
    }

    function updateBestUI() {
        document.getElementById('best-info').innerText = `BEST: ${bestData.score} (Seed: ${bestData.seed})`;
    }

    function endGame() {
        gameActive = false;
        const resOverlay = document.getElementById('result-overlay');
        resOverlay.style.display = 'flex';
        
        document.getElementById('res-score').innerText = score;
        document.getElementById('res-blue').innerText = countBlue;
        document.getElementById('res-green').innerText = countGreen;
        document.getElementById('res-red').innerText = countRed;
        document.getElementById('res-seed').innerText = currentSeed;

        const newRecordMsg = document.getElementById('new-record');
        if (score > bestData.score) {
            bestData = { score: score, seed: currentSeed };
            localStorage.setItem('neonDashBestData_v3', JSON.stringify(bestData));
            updateBestUI();
            newRecordMsg.style.display = 'block';
        } else {
            newRecordMsg.style.display = 'none';
        }
    }
</script>
</body>
</html>

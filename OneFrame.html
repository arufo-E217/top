<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1フレーム タッチシミュレーター</title>
    <style>
        :root {
            --bg-color: #121214;
            --card-bg: #1e1e24;
            --text-color: #e2e8f0;
            --primary: #3b82f6;
            --danger: #ef4444;
            --success: #10b981;
            --border: #334155;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 600px;
            width: 100%;
            background: var(--card-bg);
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            border: 1px solid var(--border);
        }

        h1 {
            font-size: 1.5rem;
            margin-top: 0;
            text-align: center;
            color: #fff;
        }

        .desc {
            font-size: 0.9rem;
            color: #94a3b8;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .panel {
            background: rgba(0,0,0,0.2);
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 16px;
            border: 1px solid var(--border);
        }

        .setting-group {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .setting-group:last-child {
            margin-bottom: 0;
        }

        label {
            font-weight: bold;
            font-size: 0.95rem;
        }

        select, button.btn-toggle {
            background: #2d3748;
            color: white;
            border: 1px solid var(--border);
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .status-display {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 20px;
            text-align: center;
        }

        .status-card {
            background: #252529;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid var(--border);
        }

        .status-val {
            font-size: 1.3rem;
            font-weight: bold;
            font-family: monospace;
        }

        .action-zone {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }

        .btn-main {
            width: 100%;
            padding: 18px;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
            user-select: none;
            -webkit-user-select: none;
        }

        .btn-normal {
            background: var(--primary);
            color: white;
        }

        .btn-normal:active {
            transform: scale(0.98);
        }

        .btn-cheat {
            background: #475569;
            color: #cbd5e1;
            font-size: 0.95rem;
            padding: 10px;
        }

        .log-section {
            background: #0f172a;
            border-radius: 8px;
            padding: 12px;
            height: 180px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 0.85rem;
            border: 1px solid var(--border);
        }

        .log-entry {
            margin-bottom: 4px;
            border-bottom: 1px solid #1e293b;
            padding-bottom: 4px;
        }

        .log-success { color: var(--success); }
        .log-bug { color: var(--danger); font-weight: bold; background: rgba(239, 68, 68, 0.1); padding: 2px 4px; border-radius: 2px;}
        .log-system { color: #64748b; }
        .log-ignored { color: #a855f7; }

        .counter-box {
            display: flex;
            justify-content: space-around;
            margin-top: 10px;
            font-size: 0.85rem;
        }
        .count-success { color: var(--success); }
        .count-bug { color: var(--danger); }
    </style>
</head>
<body>

<div class="container">
    <h1>1フレーム タッチシミュレーター</h1>
    <p class="desc">
        Unity等のUpdate（フレーム）処理の合間に、タッチイベントが同一フレーム内で複数回発火することで発生する「二重検出バグ」の実験場です。
    </p>

    <div class="panel">
        <div class="setting-group">
            <label>動作モード (FPS):</label>
            <select id="fpsSelect">
                <option value="60">60 FPS (1フレーム: 約16.6ms)</option>
                <option value="30" selected>30 FPS (1フレーム: 約33.3ms)</option>
            </select>
        </div>
        <div class="setting-group">
            <label>バグ対策 (ロジック):</label>
            <select id="fixSelect">
                <option value="none">対策なし (同一フレーム内で何回でも即時実行)</option>
                <option value="frameLock">対策あり (1フレームにつき1回のみ実行)</option>
            </select>
        </div>
    </div>

    <div class="status-display">
        <div class="status-card">
            <div>現在の仮想フレーム</div>
            <div class="status-val" id="frameDisplay">0</div>
        </div>
        <div class="status-card">
            <div>現フレーム内の検出数</div>
            <div class="status-val" id="currentFrameClicks">0</div>
        </div>
    </div>

    <div class="action-zone">
        <button id="tapBtn" class="btn-main btn-normal">ここを連打！（自力で挑戦）</button>
        <button id="cheatBtn" class="btn-main btn-cheat">【検証用】1フレーム内に2回同時タップ</button>
    </div>

    <div class="counter-box">
        <div>正常処理回数: <span id="successCount" class="count-success">0</span></div>
        <div>バグ（二重反応）発生: <span id="bugCount" class="count-bug">0</span></div>
    </div>

    <h3>処理ログ</h3>
    <div id="logConsole" class="log-section">
        <div class="log-system">シミュレーターが起動しました。</div>
    </div>
</div>

<script>
    // 状態管理
    let targetFps = 30;
    let frameLength = 1000 / targetFps;
    let currentFrame = 0;
    let lastFrameTime = performance.now();
    
    // 1フレーム内でのカウント
    let clicksInCurrentFrame = 0;
    let hasProcessedThisFrame = false; // 対策用フラグ

    // 統計カウント
    let totalSuccess = 0;
    let totalBugs = 0;

    // DOM要素
    const fpsSelect = document.getElementById('fpsSelect');
    const fixSelect = document.getElementById('fixSelect');
    const frameDisplay = document.getElementById('frameDisplay');
    const currentFrameClicks = document.getElementById('currentFrameClicks');
    const tapBtn = document.getElementById('tapBtn');
    const cheatBtn = document.getElementById('cheatBtn');
    const logConsole = document.getElementById('logConsole');
    const successCountDisp = document.getElementById('successCount');
    const bugCountDisp = document.getElementById('bugCount');

    // 設定変更イベント
    fpsSelect.addEventListener('change', (e) => {
        targetFps = parseInt(e.target.value);
        frameLength = 1000 / targetFps;
        addLog(`FPSモードを ${targetFps} FPS に変更しました。`, 'system');
    });

    // 仮想ゲームループ (UnityのUpdate風の管理)
    function gameLoop(timestamp) {
        const elapsed = timestamp - lastFrameTime;

        // 指定FPSの時間が経過したら1フレーム進める
        if (elapsed >= frameLength) {
            currentFrame++;
            // 新しいフレームになったのでフレーム内のカウントとフラグをリセット
            clicksInCurrentFrame = 0;
            hasProcessedThisFrame = false;

            // UI更新
            frameDisplay.textContent = currentFrame;
            currentFrameClicks.textContent = clicksInCurrentFrame;

            // 誤差を考慮して時間を調整
            lastFrameTime = timestamp - (elapsed % frameLength);
        }

        requestAnimationFrame(gameLoop);
    }
    // ループ開始
    requestAnimationFrame(gameLoop);

    // タップ処理のコアロジック
    function processTap(isSimulated = false) {
        clicksInCurrentFrame++;
        currentFrameClicks.textContent = clicksInCurrentFrame;

        const fixType = fixSelect.value;

        if (fixType === 'none') {
            // 【対策なし】イベントが来たらそのまま毎回通してしまう（Unityでありがちなバグ原因）
            if (clicksInCurrentFrame > 1) {
                totalBugs++;
                bugCountDisp.textContent = totalBugs;
                addLog(`[Frame ${currentFrame}] ⚠️二重反応バグ！同一フレーム内で ${clicksInCurrentFrame} 回目の入力を検出 (処理が重複して実行されました)`, 'bug');
            } else {
                totalSuccess++;
                successCountDisp.textContent = totalSuccess;
                addLog(`[Frame ${currentFrame}] 正常に処理されました (アイテム購入/画面遷移 等)`, 'success');
            }
        } 
        else if (fixType === 'frameLock') {
            // 【対策あり】同じフレームで既に処理が走っていれば弾く
            if (hasProcessedThisFrame) {
                addLog(`[Frame ${currentFrame}] 🛡️ブロック：同一フレーム内の2回目以降の入力を無視しました`, 'ignored');
            } else {
                hasProcessedThisFrame = true;
                totalSuccess++;
                successCountDisp.textContent = totalSuccess;
                addLog(`[Frame ${currentFrame}] 正常に処理されました（後続の同フレーム入力はロックされます）`, 'success');
            }
        }
    }

    // イベントリスナー (PC・スマホ両対応のため pointerdown を使用)
    tapBtn.addEventListener('pointerdown', (e) => {
        e.preventDefault();
        processTap(false);
    });

    // 【検証用】1フレーム（同一JavaScriptコールスタック内）で同時に2回呼び出す
    cheatBtn.addEventListener('click', () => {
        addLog(`--- 1フレーム内 2連打検証ボタンが押されました ---`, 'system');
        processTap(true);
        processTap(true);
    });

    // ログ出力関数
    function addLog(message, type) {
        const div = document.createElement('div');
        div.className = `log-entry log-${type}`;
        div.textContent = message;
        logConsole.appendChild(div);
        // 最下部へスクロール
        logConsole.scrollTop = logConsole.scrollHeight;
    }
</script>

</body>
</html>

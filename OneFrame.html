<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>【完全再現】1フレーム遅延 連打バグシミュレーター</title>
    <style>
        :root {
            --bg-color: #121214;
            --card-bg: #1e1e24;
            --text-color: #e2e8f0;
            --primary: #3b82f6;
            --danger: #ef4444;
            --success: #10b981;
            --warning: #f59e0b;
            --border: #334155;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 600px;
            width: 100%;
            background: var(--card-bg);
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            border: 1px solid var(--border);
        }

        h1 {
            font-size: 1.4rem;
            margin-top: 0;
            text-align: center;
            color: #fff;
        }

        .desc {
            font-size: 0.9rem;
            color: #94a3b8;
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .panel {
            background: rgba(0,0,0,0.2);
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 16px;
            border: 1px solid var(--border);
        }

        .setting-group {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .setting-group:last-child {
            margin-bottom: 0;
        }

        label {
            font-weight: bold;
            font-size: 0.95rem;
        }

        select {
            background: #2d3748;
            color: white;
            border: 1px solid var(--border);
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .status-display {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 20px;
            text-align: center;
        }

        .status-card {
            background: #252529;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid var(--border);
        }

        .status-val {
            font-size: 1.3rem;
            font-weight: bold;
            font-family: monospace;
        }

        .status-state {
            grid-column: span 2;
            background: #1a1a1e;
            padding: 8px;
            border-radius: 6px;
            font-weight: bold;
            border: 1px solid var(--border);
        }
        .state-idle { color: #94a3b8; }
        .state-processing { color: var(--warning); animation: pulse 1s infinite; }

        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }

        .action-zone {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }

        .btn-main {
            width: 100%;
            padding: 18px;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
            user-select: none;
            -webkit-user-select: none;
        }

        .btn-normal {
            background: var(--primary);
            color: white;
        }

        .btn-normal:active {
            transform: scale(0.98);
        }

        .btn-cheat {
            background: #475569;
            color: #cbd5e1;
            font-size: 0.95rem;
            padding: 10px;
        }

        .log-section {
            background: #0f172a;
            border-radius: 8px;
            padding: 12px;
            height: 220px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 0.85rem;
            border: 1px solid var(--border);
        }

        .log-entry {
            margin-bottom: 4px;
            border-bottom: 1px solid #1e293b;
            padding-bottom: 4px;
        }

        .log-success { color: var(--success); }
        .log-bug { color: var(--danger); font-weight: bold; background: rgba(239, 68, 68, 0.15); padding: 2px 4px; border-radius: 2px;}
        .log-system { color: #64748b; }
        .log-ignored { color: #a855f7; }
        .log-unity-ignore { color: #94a3b8; font-style: italic; }

        .counter-box {
            display: flex;
            justify-content: space-around;
            margin-top: 10px;
            font-size: 0.85rem;
            margin-bottom: 15px;
        }
        .count-success { color: var(--success); }
        .count-bug { color: var(--danger); }
    </style>
</head>
<body>

<div class="container">
    <h1>1フレーム遅延 連打バグシミュレーター</h1>
    <p class="desc">
        UnityのEventSystemに準拠した検証サイトです。同一フレーム内での複数入力は完全に破棄されますが、<b>「Frame NとN+1（次のフレーム）」で連続してタッチ</b>された際、ロック処理が間に合わずに発生するバグを再現します。
    </p>

    <div class="panel">
        <div class="setting-group">
            <label>動作モード (FPS):</label>
            <select id="fpsSelect">
                <option value="60">60 FPS (1フレーム: 約16.6ms)</option>
                <option value="30" selected>30 FPS (1フレーム: 約33.3ms)</option>
            </select>
        </div>
        <div class="setting-group">
            <label>バグ対策 (ロジック):</label>
            <select id="fixSelect">
                <option value="none">対策なし (ロック反映が1フレーム遅れる)</option>
                <option value="immediate">対策あり (押された瞬間に即時完全ロック)</option>
            </select>
        </div>
    </div>

    <div class="status-display">
        <div class="status-card">
            <div>現在のフレーム</div>
            <div class="status-val" id="frameDisplay">0</div>
        </div>
        <div class="status-card">
            <div>最後に押されたフレーム</div>
            <div class="status-val" id="lastPressedDisplay">-</div>
        </div>
        <div class="status-state" id="stateDisplay">
            状態: <span class="state-idle">待機中 (ボタン有効)</span>
        </div>
    </div>

    <div class="action-zone">
        <button id="tapBtn" class="btn-main btn-normal">ここを限界連打！</button>
        <button id="cheatBtn" class="btn-main btn-cheat">【検証】2フレーム連続タップ (Frame N と N+1)</button>
    </div>

    <div class="counter-box">
        <div>正常な処理開始: <span id="successCount" class="count-success">0</span></div>
        <div>二重処理バグ発生: <span id="bugCount" class="count-bug">0</span></div>
    </div>

    <h3>処理ログ</h3>
    <div id="logConsole" class="log-section">
        <div class="log-system">シミュレーターが起動しました。</div>
    </div>
</div>

<script>
    // 状態管理
    let targetFps = 30;
    let frameLength = 1000 / targetFps;
    let currentFrame = 0;
    let lastFrameTime = performance.now();
    
    // 処理の状態
    let isProcessing = false;
    let processEndFrame = 0;
    let firstPressedFrame = -1; // 処理が始まったフレーム
    let actualLockEffectiveFrame = -1; // 実際にロックが有効化されるフレーム

    // Unity仕様：同一フレーム内での重複タッチを防ぐためのフラグ
    let lastProcessedFrame = -1; 

    // 検証用：次のフレームでタップを発生させるためのターゲットフレーム
    let nextFrameTapFrame = -1;

    // 統計カウント
    let totalSuccess = 0;
    let totalBugs = 0;

    // DOM要素
    const fpsSelect = document.getElementById('fpsSelect');
    const fixSelect = document.getElementById('fixSelect');
    const frameDisplay = document.getElementById('frameDisplay');
    const lastPressedDisplay = document.getElementById('lastPressedDisplay');
    const stateDisplay = document.getElementById('stateDisplay');
    const tapBtn = document.getElementById('tapBtn');
    const cheatBtn = document.getElementById('cheatBtn');
    const logConsole = document.getElementById('logConsole');
    const successCountDisp = document.getElementById('successCount');
    const bugCountDisp = document.getElementById('bugCount');

    fpsSelect.addEventListener('change', (e) => {
        targetFps = parseInt(e.target.value);
        frameLength = 1000 / targetFps;
        addLog(`FPSモードを ${targetFps} FPS に変更しました。`, 'system');
    });

    // 仮想ゲームループ (UnityのUpdate処理に相当)
    function gameLoop(timestamp) {
        const elapsed = timestamp - lastFrameTime;

        if (elapsed >= frameLength) {
            currentFrame++;
            frameDisplay.textContent = currentFrame;

            // 非同期処理の終了判定（60フレーム経過でアイドルに戻る）
            if (isProcessing && currentFrame >= processEndFrame) {
                isProcessing = false;
                stateDisplay.innerHTML = `状態: <span class="state-idle">待機中 (ボタン有効)</span>`;
                addLog(`[Frame ${currentFrame}] ── 処理（通信/画面遷移等）が完了しました ──`, 'system');
            }

            // 【検証用】フレームが正確に 1コマ 進んだタイミングで、次の独立したタッチイベントを走らせる
            if (currentFrame === nextFrameTapFrame) {
                nextFrameTapFrame = -1;
                processTap();
            }

            lastFrameTime = timestamp - (elapsed % frameLength);
        }

        requestAnimationFrame(gameLoop);
    }
    requestAnimationFrame(gameLoop);

    // タップされた時の処理
    function processTap() {
        // 【Unity仕様の再現】
        // UnityのEventSystemは1フレームに1回しかボタンイベントを処理しない。
        // 同一フレーム（Frame N）内での複数回のタップは完全に破棄される。
        if (currentFrame === lastProcessedFrame) {
            addLog(`[Frame ${currentFrame}] (無視) 同一フレーム内での連打はUnityのEventSystemにより破棄されました。`, 'unity-ignore');
            return;
        }
        lastProcessedFrame = currentFrame;

        lastPressedDisplay.textContent = currentFrame;
        const fixType = fixSelect.value;

        // すでに処理中の場合
        if (isProcessing) {
            // ロックがすでに有効なフレームに達しているか
            if (currentFrame >= actualLockEffectiveFrame) {
                // 安全にガード
                addLog(`[Frame ${currentFrame}] 🛡️ガード: 処理中のためボタン入力を無視しました。`, 'ignored');
                return;
            } else {
                // 【1フレーム遅延バグ発生！】
                // 前のフレームで処理が始まったのに、このフレーム（Frame N+1）の時点ではロックが間に合っていない
                totalBugs++;
                bugCountDisp.textContent = totalBugs;
                addLog(`[Frame ${currentFrame}] ⚠️二重反応バグ！前フレーム(Frame ${firstPressedFrame})の処理中ですが、ロック反映の遅れ(隙)により、再度処理が走ってしまいました！`, 'bug');
                return;
            }
        }

        // 新規処理の開始
        isProcessing = true;
        firstPressedFrame = currentFrame;
        processEndFrame = currentFrame + 60; // 60フレーム間は「処理中」にする
        
        stateDisplay.innerHTML = `状態: <span class="state-processing">処理中... (Frame ${firstPressedFrame}～${processEndFrame})</span>`;
        
        totalSuccess++;
        successCountDisp.textContent = totalSuccess;
        addLog(`[Frame ${currentFrame}] 🟢新規処理を開始しました（通信・シーン遷移など）`, 'success');

        // ロックが有効化されるフレームの決定
        if (fixType === 'none') {
            // 【バグ：対策なし】ロック処理の反映が次のフレームのUpdateを挟むため、ロックが有効になるのは「次の次のフレーム(N+2)」からになる
            // つまり、Frame N で押した場合、Frame N+1 ではまだロックが有効化されておらず、すり抜ける。
            actualLockEffectiveFrame = currentFrame + 2; 
        } else {
            // 【対策あり】押されたそのフレーム内で即座に、または次のフレーム（N+1）の入力評価より前に完璧にロックされる
            actualLockEffectiveFrame = currentFrame + 1;
        }
    }

    // ボタンのイベント
    tapBtn.addEventListener('pointerdown', (e) => {
        e.preventDefault();
        processTap();
    });

    // 【検証用】2フレーム連続タップ (Frame N と N+1)
    cheatBtn.addEventListener('click', () => {
        addLog(`--- 2フレーム連続タップ検証（Frame N と N+1）を開始 ---`, 'system');
        // 1回目のタップ（現フレーム：Frame N）
        processTap();
        // 先行入力ではなく、ゲームループが「次のフレーム（Frame N+1）」に進むのを正確に待ってから2回目を実行
        nextFrameTapFrame = currentFrame + 1;
    });

    function addLog(message, type) {
        const div = document.createElement('div');
        div.className = `log-entry log-${type}`;
        div.textContent = message;
        logConsole.appendChild(div);
        logConsole.scrollTop = logConsole.scrollHeight;
    }
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Double Limit - 期待値計算ゲーム</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; text-align: center; padding: 20px; }
        .card { font-size: 48px; background: white; color: black; width: 80px; height: 120px; line-height: 120px; margin: 20px auto; border-radius: 10px; font-weight: bold; }
        .stats { display: flex; justify-content: center; gap: 20px; margin-bottom: 20px; }
        .panel { background: #333; padding: 15px; border-radius: 10px; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; border: none; border-radius: 5px; background: #4CAF50; color: white; transition: 0.2s; }
        button:hover { opacity: 0.8; }
        button:disabled { background: #555; }
        .danger { background: #f44336; }
        .info { font-size: 0.9em; color: #aaa; margin-top: 10px; }
    </style>
</head>
<body>

    <h1>Double Limit 🎲</h1>
    
    <div class="stats">
        <div class="panel">持ち金: <span id="balance">1000</span></div>
        <div class="panel">現在の倍率: <span id="multiplier">1.0</span>x</div>
    </div>

    <div class="card" id="card-display">?</div>

    <div id="controls">
        <p>次のカードを予想せよ（1〜13）</p>
        <button onclick="play('low')">Low (1-6) <br> <small>x1.8</small></button>
        <button onclick="play('mid')" style="background: #2196F3;">Middle (7) <br> <small>x10.0</small></button>
        <button onclick="play('high')">High (8-13) <br> <small>x1.8</small></button>
        <br><br>
        <button id="bank-btn" class="danger" onclick="bank()" disabled>確定 (Bank) して賞金獲得</button>
    </div>

    <p id="message">掛け金を選択してください（1回100pt）</p>

    <div class="info">
        <p>【期待値ヒント】<br>
        Low/High: 成功確率 $6/13 \approx 46.1\%$ | Middle: 成功確率 $1/13 \approx 7.7\%$</p>
    </div>

    <script>
        let balance = 1000;
        let currentPool = 0;
        let combo = 0;
        const betAmount = 100;

        function play(guess) {
            if (currentPool === 0) {
                if (balance < betAmount) {
                    alert("破産しました！リロードして再挑戦。");
                    return;
                }
                balance -= betAmount;
                currentPool = betAmount;
                updateUI();
            }

            const card = Math.floor(Math.random() * 13) + 1;
            document.getElementById('card-display').innerText = card;

            let win = false;
            let rate = 0;

            if (guess === 'low' && card <= 6) { win = true; rate = 1.8; }
            else if (guess === 'mid' && card === 7) { win = true; rate = 10.0; }
            else if (guess === 'high' && card >= 8) { win = true; rate = 1.8; }

            if (win) {
                combo++;
                // 連勝ボーナス: 1.1^(n-1) を乗算して期待値を底上げ
                let bonus = Math.pow(1.1, combo - 1);
                currentPool = Math.floor(currentPool * rate * bonus);
                document.getElementById('message').innerText = `的中！ 現在の賞金: ${currentPool}`;
                document.getElementById('bank-btn').disabled = false;
            } else {
                document.getElementById('message').innerText = `ハズレ... ${card} でした。全没収！`;
                currentPool = 0;
                combo = 0;
                document.getElementById('bank-btn').disabled = true;
            }
            updateUI();
        }

        function bank() {
            balance += currentPool;
            document.getElementById('message').innerText = `${currentPool} を獲得しました！`;
            currentPool = 0;
            combo = 0;
            document.getElementById('bank-btn').disabled = true;
            updateUI();
        }

        function updateUI() {
            document.getElementById('balance').innerText = balance;
            document.getElementById('multiplier').innerText = (combo > 0) ? (currentPool/betAmount).toFixed(1) : "1.0";
        }
    </script>
</body>
</html>

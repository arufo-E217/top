<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exponentia - Mathematical Increment</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/break_infinity.js/2.0.0/break_infinity.min.js"></script>
    <style>
        :root {
            --bg: #000;
            --fg: #fff;
            --accent: #fff;
            --dim: #333;
            --glow: rgba(255, 255, 255, 0.2);
        }

        body, html {
            margin: 0; padding: 0;
            background-color: var(--bg);
            color: var(--fg);
            font-family: 'serif';
            overflow: hidden;
            user-select: none;
            touch-action: manipulation;
        }

        #app {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
            padding: 20px;
            box-sizing: border-box;
        }

        /* --- Header: クリック可能なメインエリア --- */
        #header {
            text-align: center;
            padding: 40px 0;
            cursor: pointer;
            transition: transform 0.05s;
            z-index: 100;
        }

        #header:active {
            transform: scale(0.98);
        }

        #main-display {
            font-size: clamp(2rem, 8vw, 4rem);
            margin: 0;
            font-weight: 100;
            letter-spacing: -1px;
        }

        #derivative-display {
            font-size: 1.2rem;
            color: #666;
            margin-top: 10px;
        }

        /* --- Visualizer --- */
        #canvas-container {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
        }

        /* --- Footer: アップグレード --- */
        #footer {
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
            border-top: 1px solid var(--dim);
            background: rgba(0,0,0,0.9);
        }

        .tabs {
            display: flex;
            justify-content: center;
            border-bottom: 1px solid var(--dim);
        }

        .tab-btn {
            background: none; border: none;
            color: #555; padding: 15px 20px;
            cursor: pointer; font-size: 0.9rem;
            transition: 0.3s;
        }

        .tab-btn.active {
            color: #fff;
            border-bottom: 2px solid #fff;
        }

        .upgrade-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1px;
            background: var(--dim);
            height: 220px;
            overflow-y: auto;
        }

        .upgrade-card {
            background: var(--bg);
            padding: 20px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: background 0.2s;
        }

        .upgrade-card:hover:not(.disabled) {
            background: #111;
        }

        .upgrade-card.disabled {
            opacity: 0.2;
            cursor: not-allowed;
        }

        .upg-info { margin-bottom: 10px; }
        .upg-name { font-size: 1rem; display: block; margin-bottom: 4px; }
        .upg-desc { font-size: 0.75rem; color: #666; }
        .upg-stats {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }
        .upg-cost { font-size: 0.85rem; font-family: monospace; }
        .upg-level { font-size: 0.7rem; color: #444; }

        /* --- Singularity --- */
        #prestige-layer {
            position: fixed;
            top: 20px; right: 20px;
        }
        #singularity-btn {
            display: none;
            background: #fff; color: #000;
            border: none; padding: 12px 24px;
            font-weight: bold; cursor: pointer;
            box-shadow: 0 0 20px var(--glow);
        }

        @media (max-width: 600px) {
            .upgrade-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div id="app">
    <div id="prestige-layer">
        <button id="singularity-btn" onclick="prestige()">SINGULARITY</button>
    </div>

    <header id="header" onclick="handleManualClick()">
        <div id="main-display">x = 0</div>
        <div id="derivative-display">dx/dt = 0</div>
        <div style="font-size: 0.7rem; color: #333; margin-top: 5px;">(Click to Increment)</div>
    </header>

    <div id="canvas-container">
        <canvas id="vizCanvas"></canvas>
    </div>

    <footer id="footer">
        <div class="tabs">
            <button class="tab-btn active" onclick="showTab(1)">Layer I</button>
            <button class="tab-btn" id="tab2-btn" style="display:none" onclick="showTab(2)">Layer II</button>
            <button class="tab-btn" id="tab3-btn" style="display:none" onclick="showTab(3)">Layer III</button>
        </div>

        <div id="layer1" class="upgrade-grid"></div>
        <div id="layer2" class="upgrade-grid" style="display:none"></div>
        <div id="layer3" class="upgrade-grid" style="display:none"></div>
    </footer>
</div>

<script>
    /**
     * ============================================================
     * BALANCING_CONFIG: ゲームバランス調整用パラメータ
     * ============================================================
     */
    const CONFIG = {
        // --- 基本設定 ---
        baseClickValue: 1.0,           // 1クリックで増える量
        tickRate: 60,                  // 1秒あたりの更新回数
        
        // --- Layer 1: 加算の階層 ---
        l1_1: {
            name: "Incrementer",
            desc: "クリックと秒間増加の基本値を底上げする",
            baseCost: 15,              // 初期コスト
            costMult: 1.15,            // レベルアップ毎の価格上昇倍率
            power: 1                   // 1レベルあたりの増加量
        },
        l1_2: {
            name: "Auto-Derivator",
            desc: "自動でxを生成する演算器",
            baseCost: 100,
            costMult: 1.25,
            power: 5
        },

        // --- Layer 2: 乗算の階層 ---
        l2_1: {
            name: "Multiplier",
            desc: "全出力を乗算的に強化する",
            baseCost: 1e4,
            costMult: 2.0,
            power: 1.5                 // 1レベルあたりの倍率(1.5倍)
        },
        l2_2: {
            name: "Efficiency",
            desc: "演算効率を高め、基本出力を向上させる",
            baseCost: 1e6,
            costMult: 5.0,
            power: 2
        },

        // --- Layer 3: 指数の階層 ---
        l3_1: {
            name: "Exponential Growth",
            desc: "成長曲線そのものを指数関数へ変貌させる",
            baseCost: 1e12,
            costMult: 10.0,
            power: 0.01                // 指数に加算される微小値
        },

        // --- システム解放の閾値 ---
        unlocks: {
            layer2: 1000,              // Layer 2が解放されるxの値
            layer3: 1e10,              // Layer 3が解放されるxの値
            singularity: 1.79e308      // Singularityが発生可能になる値(Number.MAX_VALUE)
        }
    };

    const D = (val) => new Decimal(val);

    // --- State Management ---
    let state = {
        x: D(0),
        singularityCount: D(0),
        lastTick: Date.now(),
        upgrades: {
            l1_1: D(0), l1_2: D(0),
            l2_1: D(0), l2_2: D(0),
            l3_1: D(0)
        }
    };

    // --- Core Math Functions ---
    function getDx() {
        // 1. 加算ベース
        let base = D(state.upgrades.l1_1).mul(CONFIG.l1_1.power);
        let auto = D(state.upgrades.l1_2).mul(CONFIG.l1_2.power);
        let totalBase = base.add(auto);

        // 2. 乗算補正
        let mult = D(CONFIG.l2_1.power).pow(state.upgrades.l2_1);
        let eff = D(CONFIG.l2_2.power).pow(state.upgrades.l2_2);
        let res = totalBase.mul(mult).mul(eff);

        // 3. 指数補正
        if (state.upgrades.l3_1.gt(0)) {
            let exp = D(1).add(D(state.upgrades.l3_1).mul(CONFIG.l3_1.power));
            res = res.pow(exp);
        }

        // 4. Singularityボーナス (次回プレイへの影響)
        res = res.mul(D(2).pow(state.singularityCount));

        return res;
    }

    function getUpgradeCost(id) {
        const conf = CONFIG[id];
        return D(conf.baseCost).mul(D(conf.costMult).pow(state.upgrades[id]));
    }

    // --- UI Logic ---
    function format(decimal) {
        if (decimal.lt(1e6)) return decimal.toNumber().toLocaleString(undefined, {maximumFractionDigits: 1});
        if (decimal.lt(D(10).pow(1000))) {
            return `${decimal.mantissa.toFixed(2)} \\times 10^{${decimal.exponent}}`;
        }
        return `10^{10^{${Math.log10(decimal.log10()).toFixed(3)}}}`;
    }

    function handleManualClick() {
        let clickVal = D(CONFIG.baseClickValue).add(D(state.upgrades.l1_1).mul(CONFIG.l1_1.power));
        state.x = state.x.add(clickVal);
        createClickEffect();
        updateDisplay();
    }

    function buyUpgrade(id) {
        const cost = getUpgradeCost(id);
        if (state.x.gte(cost)) {
            state.x = state.x.sub(cost);
            state.upgrades[id] = state.upgrades[id].add(1);
            updateDisplay();
        }
    }

    function updateDisplay() {
        document.getElementById('main-display').innerHTML = `x = ${format(state.x)}`;
        document.getElementById('derivative-display').innerHTML = `dx/dt = ${format(getDx())}`;
        
        // 解放チェック
        if (state.x.gt(CONFIG.unlocks.layer2)) document.getElementById('tab2-btn').style.display = 'block';
        if (state.x.gt(CONFIG.unlocks.layer3)) document.getElementById('tab3-btn').style.display = 'block';
        if (state.x.gt(CONFIG.unlocks.singularity)) document.getElementById('singularity-btn').style.display = 'block';

        // ボタンの更新
        for (let id in state.upgrades) {
            const btn = document.getElementById(`btn-${id}`);
            if (!btn) continue;
            const cost = getUpgradeCost(id);
            btn.querySelector('.upg-cost').innerText = `Cost: ${format(cost)}`;
            btn.querySelector('.upg-level').innerText = `Lv. ${state.upgrades[id].toString()}`;
            btn.classList.toggle('disabled', state.x.lt(cost));
        }
    }

    function createUpgrades() {
        const structure = {
            layer1: ['l1_1', 'l1_2'],
            layer2: ['l2_1', 'l2_2'],
            layer3: ['l3_1']
        };

        for (let layerId in structure) {
            const container = document.getElementById(layerId);
            structure[layerId].forEach(id => {
                const conf = CONFIG[id];
                const card = document.createElement('div');
                card.className = 'upgrade-card';
                card.id = `btn-${id}`;
                card.onclick = () => buyUpgrade(id);
                card.innerHTML = `
                    <div class="upg-info">
                        <span class="upg-name">${conf.name}</span>
                        <span class="upg-desc">${conf.desc}</span>
                    </div>
                    <div class="upg-stats">
                        <span class="upg-cost"></span>
                        <span class="upg-level"></span>
                    </div>
                `;
                container.appendChild(card);
            });
        }
    }

    // --- System Functions ---
    const canvas = document.getElementById('vizCanvas');
    const ctx = canvas.getContext('2d');
    function loop() {
        const now = Date.now();
        const dt = (now - state.lastTick) / 1000;
        state.lastTick = now;

        state.x = state.x.add(getDx().mul(dt));

        drawVisuals();
        updateDisplay();
        requestAnimationFrame(loop);
    }

    function drawVisuals() {
        ctx.fillStyle = 'rgba(0,0,0,0.1)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;
        const time = Date.now() * 0.001;
        const intensity = Math.min(state.x.add(1).log10(), 100);

        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 0.5;
        ctx.beginPath();
        for(let i=0; i<intensity; i++) {
            let r = (i * 5) + (Math.sin(time) * 10);
            let x = centerX + Math.cos(time + i*0.1) * r;
            let y = centerY + Math.sin(time*0.5 + i*0.1) * r;
            ctx.lineTo(x, y);
        }
        ctx.stroke();
    }

    function createClickEffect() {
        // オプション: クリック時の視覚効果（波紋など）
    }

    function showTab(n) {
        ['layer1', 'layer2', 'layer3'].forEach((id, idx) => {
            document.getElementById(id).style.display = (idx + 1 === n) ? 'grid' : 'none';
            document.querySelectorAll('.tab-btn')[idx].classList.toggle('active', idx + 1 === n);
        });
    }

    function prestige() {
        if(!confirm("Singularityを発生させます。現在のxとアップグレードを失う代わりに、永久的な倍率ボーナスを得ます。よろしいですか？")) return;
        state.singularityCount = state.singularityCount.add(1);
        state.x = D(0);
        for(let id in state.upgrades) state.upgrades[id] = D(0);
        save();
        location.reload(); 
    }

    function save() {
        const data = {
            x: state.x.toString(),
            sc: state.singularityCount.toString(),
            upg: {}
        };
        for(let id in state.upgrades) data.upg[id] = state.upgrades[id].toString();
        localStorage.setItem('exponentia_v2', JSON.stringify(data));
    }

    function load() {
        const raw = localStorage.getItem('exponentia_v2');
        if(!raw) return;
        const data = JSON.parse(raw);
        state.x = D(data.x);
        state.singularityCount = D(data.sc);
        for(let id in data.upg) state.upgrades[id] = D(data.upg[id]);
    }

    window.onload = () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight * 0.4;
        load();
        createUpgrades();
        loop();
        setInterval(save, 10000); // 10秒毎にオートセーブ
    };
</script>
</body>
</html>
